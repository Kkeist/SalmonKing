    const SKIN_CONFIG = {
      // 盘子多一个 "random" 选项，用于随机从已解锁盘子里选
      plateColors: ["black", "blue", "brown", "gold", "green", "grey", "pink", "red", "dark", "random"],
      chopColors: ["black", "blue", "brown", "gold", "green", "grey", "pink", "red", "silver"]
    };
    const SKIN_PRICE = 5;
    const STORAGE_KEY = "salmon_king_progress_v1";

    // 闯关模式：按 关卡指导.txt 的解锁顺序 ----------------------------------------------

    // 关卡指导 解锁顺序
    const DRINK_ORDER = ["hu", "cha", "coke", "calpis", "orange"];
    const DISH_ORDER = ["salmonSlice", "fryRice", "salmon_belly", "beef", "salmonCube", "salmon_noodle"];
    const SAUCE_ORDER = ["soy", "wb", "mayo", "on", "egg", "lz", "seaweed"];
    const CONVEYOR_ORDER = [
      "norm_salmon", "norm_tuna", "norm_ikura", "norm_corn", "norm_seaweed",
      "roll_salmonAvoca", "california_crab", "norm_eel", "norm_crab", "norm_egg",
      "norm_shirmp", "roll_cucum", "tempera_mid", "salmonLove",
      "norm_salmon_aburi", "norm_salmon_aburiMayo", "norm_salmon_aburiMayIkura",
      "roll_salmon", "california_tempera"
    ];

    // 关卡现在默认全部可玩，不需要作弊/依次解锁开关

    // 关卡指导：每关解锁的物品（该关首次出现）
    const DRINK_UNLOCK_LEVEL = { hu: 1, cha: 6, coke: 12, calpis: 18, orange: 22 };
    const DISH_UNLOCK_LEVEL = { salmonSlice: 1, fryRice: 4, salmon_belly: 7, beef: 13, salmonCube: 17, salmon_noodle: 23 };
    const SAUCE_UNLOCK_LEVEL = { soy: 1, wb: 1, mayo: 8, on: 11, egg: 14, lz: 18, seaweed: 22 };
    const CONVEYOR_UNLOCK_LEVEL = {
      norm_salmon: 1, norm_tuna: 1, norm_ikura: 2, norm_corn: 3, norm_seaweed: 3,
      roll_salmonAvoca: 5, california_crab: 6, norm_eel: 8, norm_crab: 9, norm_egg: 9,
      norm_shirmp: 12, roll_cucum: 15, tempera_mid: 16, salmonLove: 19,
      norm_salmon_aburi: 21, norm_salmon_aburiMayo: 24, norm_salmon_aburiMayIkura: 24,
      roll_salmon: 25, california_tempera: 25
    };
    // 关卡指导：回转寿司桌上位置数 2→3(6关) 4(9关) 5(19关) 6(25关)
    function getConveyorSlotsForLevel(levelId) {
      if (levelId >= 25) return 6;
      if (levelId >= 19) return 5;
      if (levelId >= 9) return 4;
      if (levelId >= 6) return 3;
      return 2;
    }

    function buildLevelConfigs() {
      const levels = [];
      const TOTAL = 25;
      for (let i = 1; i <= TOTAL; i++) {
        const unlockedDrinks = DRINK_ORDER.filter(d => (DRINK_UNLOCK_LEVEL[d] || 99) <= i);
        const unlockedDishes = DISH_ORDER.filter(d => (DISH_UNLOCK_LEVEL[d] || 99) <= i);
        const unlockedSauces = SAUCE_ORDER.filter(s => (SAUCE_UNLOCK_LEVEL[s] || 99) <= i);
        const unlockedConveyor = CONVEYOR_ORDER.filter(c => (CONVEYOR_UNLOCK_LEVEL[c] || 99) <= i);
        const conveyorSlots = getConveyorSlotsForLevel(i);
        // 分数要求整体提高一点（保持线性增长）；奖励关使用独立阈值
        let targetScore;
        if (i === 10) targetScore = 25;       // 第10关：接东西
        else if (i === 20) targetScore = 30;  // 第20关：夹寿司
        else {
          const baseTarget = 50 + (i - 1) * 12;
          targetScore = Math.round(baseTarget * 1.3);
        }
        const timeLimit = (i === 10 || i === 20) ? 30 : 120;
        levels.push({
          id: i,
          timeLimit,
          targetScore,
          unlockedDrinks,
          unlockedDishes,
          unlockedSauces,
          unlockedConveyor,
          conveyorSlots
        });
      }
      return levels;
    }

    const LEVELS = buildLevelConfigs();
    const TOTAL_LEVELS = LEVELS.length;

    function getLevelConfig(index) {
      if (!LEVELS || !LEVELS.length) return null;
      const i = Math.max(1, Math.min(TOTAL_LEVELS, index || 1));
      return LEVELS[i - 1];
    }

    function getDefaultLevelProgress() {
      const arr = [];
      for (let i = 0; i < TOTAL_LEVELS; i++) arr.push(0);
      const tierArr = [];
      for (let i = 0; i < TOTAL_LEVELS; i++) tierArr.push(-1); // -1 表示从未达成 3 星
      return {
        maxUnlockedLevel: 1,
        levelStars: arr,
        // 三星通关“饭友挑战”等级：0=单人深色，1=粉，2=橙，3=紫，4=金（取最高覆盖）
        level3StarFriendTier: tierArr
      };
    }

    function ensureLevelProgressInState() {
      if (!STATE.levelProgress || !Array.isArray(STATE.levelProgress.levelStars)) {
        STATE.levelProgress = getDefaultLevelProgress();
        return;
      }
      // 补齐长度
      const arr = STATE.levelProgress.levelStars;
      while (arr.length < TOTAL_LEVELS) arr.push(0);
      if (!Array.isArray(STATE.levelProgress.level3StarFriendTier)) {
        STATE.levelProgress.level3StarFriendTier = [];
      }
      const tArr = STATE.levelProgress.level3StarFriendTier;
      while (tArr.length < TOTAL_LEVELS) tArr.push(-1);
      if (typeof STATE.levelProgress.maxUnlockedLevel !== "number" || STATE.levelProgress.maxUnlockedLevel < 1) {
        STATE.levelProgress.maxUnlockedLevel = 1;
      }
      if (STATE.levelProgress.maxUnlockedLevel > TOTAL_LEVELS) {
        STATE.levelProgress.maxUnlockedLevel = TOTAL_LEVELS;
      }
    }

    function isFriendsActive() {
      if (STATE.mode === "friends") return true;
      if (STATE.mode === "level") {
        const n = Math.min(Math.max(0, STATE.levelExtraFriendsCount || 0), 4);
        return n > 0;
      }
      return false;
    }
    function getActiveFriendsCount() {
      if (!isFriendsActive()) return 0;
      if (STATE.mode === "friends") return Math.min(Math.max(1, STATE.friendsCount || 2), 4);
      return Math.min(Math.max(1, STATE.levelExtraFriendsCount || 0), 4);
    }

    function isLevelUnlocked(index) {
      // 现在默认所有关卡都可选，可重复体验
      return true;
    }

    function getLevelBestStars(index) {
      ensureLevelProgressInState();
      if (!STATE.levelProgress || !Array.isArray(STATE.levelProgress.levelStars)) return 0;
      const arr = STATE.levelProgress.levelStars;
      if (index <= 0 || index > arr.length) return 0;
      return arr[index - 1] || 0;
    }

    function isComboAllowedInLevel(combo, cfg) {
      if (!cfg || !combo || !combo.length) return true;
      // 统一归一化后再判定，防止出现 "soy+wb" 这类 token 导致漏判
      const norm = normalizeGroupItems(Array.isArray(combo) ? combo : []);
      if (!norm || !norm.length) return true;
      const base = norm[0];
      const mods = norm.slice(1);
      const drinkSet = new Set(cfg.unlockedDrinks || []);
      const dishSet = new Set(cfg.unlockedDishes || []);
      const convSet = new Set(cfg.unlockedConveyor || []);
      const sauceSet = new Set(cfg.unlockedSauces || []);

      if (["hu", "cha", "orange", "coke", "calpis"].includes(base)) {
        if (!drinkSet.has(base)) return false;
      } else if (["salmon_belly", "salmonCube", "salmon_noodle", "salmonSlice", "beef", "fryRice"].includes(base)) {
        if (!dishSet.has(base)) return false;
      } else {
        // 其余视为回转寿司
        if (!convSet.has(base)) return false;
      }

      for (let i = 0; i < mods.length; i++) {
        if (!sauceSet.has(mods[i])) return false;
      }
      return true;
    }

    function handleLevelFinish() {
      const idx = STATE.currentLevelIndex || 1;
      const isRewardLevel = REWARD_LEVELS.indexOf(idx) !== -1;
      const cfg = getLevelConfig(idx);
      const target = cfg && cfg.targetScore ? cfg.targetScore : 100;
      let stars = 0;
      if (isRewardLevel) {
        // 奖励关：通关即 1 星（目标分数达到即通关）
        stars = (target > 0 && STATE.score >= Math.ceil(target * 0.6)) ? 1 : 0;
      } else {
        const ratio = target > 0 ? (STATE.score / target) : 0;
        if (ratio >= 1) stars = 3;
        else if (ratio >= 0.8) stars = 2;
        else if (ratio >= 0.6) stars = 1;
      }

      ensureLevelProgressInState();
      const arr = STATE.levelProgress.levelStars;
      const prev = arr[idx - 1] || 0;
      if (stars > prev) arr[idx - 1] = stars;
      // 三星 + 饭友挑战边框：只在正常关（非奖励关）记录；高等级覆盖低等级
      if (!isRewardLevel && stars >= 3) {
        const tierArr = STATE.levelProgress.level3StarFriendTier;
        const prevTier = (tierArr && typeof tierArr[idx - 1] === "number") ? tierArr[idx - 1] : -1;
        const candidateTier = Math.min(4, Math.max(0, isFriendsActive() ? getActiveFriendsCount() : 0));
        // 保证单人三星也会显示深色边框（tier>=0）
        const nextTier = Math.max(prevTier, candidateTier, 0);
        if (tierArr) tierArr[idx - 1] = nextTier;
      }
      // 关卡星星每个只能得一次：只把本次新得的数量加入总星
      const delta = Math.max(0, stars - prev);
      if (delta > 0) {
        STATE.stars += delta;
        updateStarDisplay();
      }
      saveProgressToStorage();

      const bestStars = arr[idx - 1] || 0;
      const maxStars = isRewardLevel ? 1 : 3;
      const filled = bestStars;
      const empty = maxStars - bestStars;
      const starHtml =
        `<span style="color:#ffb400;font-size:1.6rem;">${"★".repeat(filled)}</span>` +
        `<span style="color:#e0c8a0;font-size:1.6rem;">${"★".repeat(empty)}</span>`;
      const msg = (isEN() ? `Level ${idx} cleared!<br>` : `第 ${idx} 关完成！<br>`) + starHtml;

      const btns = [
        {
          text: t("再玩一次", "Play Again"),
          primary: true,
          cb: () => {
            STATE.playing = false;
            STATE.paused = false;
            if (typeof resetHolding === "function") resetHolding();
            if (isRewardLevel) {
              openRewardScreen(idx);
              startRewardLevelMiniGame(idx);
            } else {
              startGame("level");
            }
          }
        }
      ];

      if (idx < TOTAL_LEVELS) {
        btns.push({
          text: t("下一关", "Next Level"),
          cb: () => {
            let nextIdx = Math.min(TOTAL_LEVELS, idx + 1);
            // 当前是奖励关（10 或 20）：“下一关”一律进正常闯关页面（11 或 21），不再跳到另一个奖励关壳
            const isReward = REWARD_LEVELS.indexOf(idx) !== -1;
            STATE.currentLevelIndex = nextIdx;
            STATE.playing = false;
            STATE.paused = false;
            if (typeof resetHolding === "function") resetHolding();
            document.getElementById("custom-modal").classList.remove("visible");
            if (!isReward && REWARD_LEVELS.indexOf(nextIdx) !== -1) {
              // 正常关通关 → 下一关刚好是奖励关（例如 9→10、19→20）：进入奖励关专用页
              openRewardScreen(nextIdx);
            } else {
              // 奖励关通关 或 正常关→正常关：统一走正常闯关 HUD
              showView("game");
              startGame("level", { startTimer: false });
              showLevelStartModal(nextIdx);
            }
          }
        });
      }

      btns.push({
        text: t("选择关卡", "Select Level"),
        cb: () => {
          STATE.paused = false;
          STATE.playing = false;
          if (typeof resetHolding === "function") resetHolding();
          const modal = document.getElementById("custom-modal");
          if (modal) modal.classList.remove("visible");
          openLevelScreen();
        }
      });

      btns.push({
        text: t("返回标题", "Back to Title"),
        fullWidth: true,
        cb: goToTitle
      });

      showCustomModal(msg, btns);
    }

    function showLevelFailModal() {
      const idx = STATE.currentLevelIndex || 1;
      const msg = isEN()
        ? `Level ${idx} failed!<br>Try again!`
        : `第 ${idx} 关失败！<br>分数掉到 0 以下了……`;
      showCustomModal(msg, [
        {
          text: t("再玩一次", "Play Again"),
          primary: true,
          cb: () => {
            STATE.playing = false;
            STATE.paused = false;
            if (typeof resetHolding === "function") resetHolding();
            startGame("level", { startTimer: false });
            showLevelStartModal(idx);
          }
        },
        {
          text: t("选择关卡", "Select Level"),
          cb: () => {
            STATE.paused = false;
            STATE.playing = false;
            if (typeof resetHolding === "function") resetHolding();
            openLevelScreen();
          }
        },
        { text: t("返回标题", "Back to Title"), fullWidth: true, cb: goToTitle }
      ]);
    }

    function getPlateImgNameByColor(color) {
      const c = color || "black";
      return `sushiPlate_${c}.PNG`;
    }

    function getRandomUnlockedPlateColor() {
      // 只能在“已解锁且真的有贴图”的盘子里随机
      const all = STATE.unlockedPlateSkins || {};
      const list = Object.keys(all).filter(c => {
        if (!all[c]) return false;
        const imgName = getPlateImgNameByColor(c);
        return !!g_CroppedCanvas[imgName];
      });
      if (list.length === 0) return "black";
      return list[Math.floor(Math.random() * list.length)];
    }

    function getChopImgNamesByColor(color) {
      const c = color || "black";
      const back = `backChopstick_${c}.PNG`;
      const front = c === "silver" ? "frontChopstick_sliver.PNG" : `frontChopstick_${c}.PNG`;
      return { back, front };
    }

    function loadProgressFromStorage() {
      try {
        const raw = window.localStorage && window.localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (typeof data.stars === "number" && data.stars >= 0) STATE.stars = data.stars;
        if (typeof data.challengeBestStars === "number") STATE.challengeBestStars = Math.max(0, Math.min(5, data.challengeBestStars | 0));
        if (data.currentPlateSkin) STATE.currentPlateSkin = data.currentPlateSkin;
        if (data.currentChopSkin) STATE.currentChopSkin = data.currentChopSkin;
        if (data.unlockedPlateSkins && typeof data.unlockedPlateSkins === "object") {
          STATE.unlockedPlateSkins = Object.assign({ black: true }, data.unlockedPlateSkins);
        }
        if (data.unlockedChopSkins && typeof data.unlockedChopSkins === "object") {
          STATE.unlockedChopSkins = Object.assign({ black: true }, data.unlockedChopSkins);
        }
        if (data.levelProgress && typeof data.levelProgress === "object") {
          STATE.levelProgress = {
            maxUnlockedLevel: data.levelProgress.maxUnlockedLevel || 1,
            levelStars: Array.isArray(data.levelProgress.levelStars) ? data.levelProgress.levelStars.slice() : [],
            level3StarFriendTier: Array.isArray(data.levelProgress.level3StarFriendTier) ? data.levelProgress.level3StarFriendTier.slice() : []
          };
        }
      } catch (e) { }
    }

    function saveProgressToStorage() {
      try {
        const data = {
          stars: STATE.stars,
          challengeBestStars: STATE.challengeBestStars || 0,
          currentPlateSkin: STATE.currentPlateSkin,
          currentChopSkin: STATE.currentChopSkin,
          unlockedPlateSkins: STATE.unlockedPlateSkins,
          unlockedChopSkins: STATE.unlockedChopSkins,
          levelProgress: STATE.levelProgress
        };
        if (window.localStorage) window.localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) { }
    }

    function updateStarDisplay() {
      const el = document.getElementById("shop-star-count");
      if (el) el.innerText = STATE.stars.toString();
    }

    function applyCurrentChopSkin() {
      const wrapBack = document.getElementById("chop-back");
      const wrapFront = document.getElementById("chop-front");
      if (!wrapBack || !wrapFront) return;
      wrapBack.innerHTML = "";
      wrapFront.innerHTML = "";
      const names = getChopImgNamesByColor(STATE.currentChopSkin);
      const cb = cloneCanvasSafe(names.back);
      const cf = cloneCanvasSafe(names.front);
      if (cb) wrapBack.appendChild(cb);
      if (cf) wrapFront.appendChild(cf);
    }

    function renderSkinList(kind, colors, containerId) {
      const listEl = document.getElementById(containerId);
      if (!listEl) return;
      listEl.innerHTML = "";
      colors.forEach(color => {
        const item = document.createElement("div");
        item.className = "skin-item";
        const unlockedMap = kind === "plate" ? STATE.unlockedPlateSkins : STATE.unlockedChopSkins;
        const currentColor = kind === "plate" ? STATE.currentPlateSkin : STATE.currentChopSkin;
        let unlocked = true;
        if (!(kind === "plate" && color === "random")) {
          unlocked = !!(unlockedMap && unlockedMap[color]);
        }
        if (!unlocked) item.classList.add("locked");
        if (currentColor === color) item.classList.add("selected");

        const preview = document.createElement("div");
        preview.className = "skin-preview";
        if (kind === "plate") {
          if (color === "random") {
            // random 预览：用当前解锁盘子里任意一个加上问号提示
            const sampleColor = getRandomUnlockedPlateColor();
            preview.appendChild(cloneCanvasSafe(getPlateImgNameByColor(sampleColor)));
            const q = document.createElement("div");
            q.style.position = "absolute";
            q.style.right = "2px";
            q.style.bottom = "0";
            q.style.fontSize = "1rem";
            q.style.fontWeight = "bold";
            q.style.color = "#c45c3e";
            q.textContent = "?";
            preview.appendChild(q);
          } else {
            const imgName = getPlateImgNameByColor(color);
            preview.appendChild(cloneCanvasSafe(imgName));
          }
        } else {
          const names = getChopImgNamesByColor(color);
          const backWrap = document.createElement("div");
          backWrap.style.position = "absolute";
          backWrap.style.left = "4px";
          backWrap.style.top = "4px";
          backWrap.style.right = "4px";
          backWrap.style.bottom = "4px";
          backWrap.style.display = "flex";
          backWrap.style.alignItems = "center";
          backWrap.style.justifyContent = "center";
          backWrap.style.opacity = "0.65";
          const cb = cloneCanvasSafe(names.back);
          if (cb) backWrap.appendChild(cb);

          const frontWrap = document.createElement("div");
          frontWrap.style.position = "absolute";
          frontWrap.style.left = "8px";
          frontWrap.style.top = "0";
          frontWrap.style.right = "0";
          frontWrap.style.bottom = "0";
          frontWrap.style.display = "flex";
          frontWrap.style.alignItems = "center";
          frontWrap.style.justifyContent = "center";
          const cf = cloneCanvasSafe(names.front);
          if (cf) frontWrap.appendChild(cf);

          preview.appendChild(backWrap);
          preview.appendChild(frontWrap);
        }
        item.appendChild(preview);

        if (!unlocked) {
          const cost = document.createElement("div");
          cost.className = "skin-cost";
          cost.innerText = "★" + SKIN_PRICE;
          item.appendChild(cost);
        }

        item.onclick = () => {
          // 特殊规则：盘子里的 "random" 选项不消耗星星，只是切换为随机皮肤模式
          if (kind === "plate" && color === "random") {
            STATE.currentPlateSkin = "random";
            saveProgressToStorage();
            renderSkinList("chop", SKIN_CONFIG.chopColors, "shop-chop-pane");
            renderSkinList("plate", SKIN_CONFIG.plateColors, "shop-plate-pane");
            return;
          }

          const unlockedNow = kind === "plate" ? STATE.unlockedPlateSkins[color] : STATE.unlockedChopSkins[color];
          if (!unlockedNow) {
            if (STATE.stars < SKIN_PRICE) {
              const box = document.querySelector("#shop-modal .shop-box");
              if (box) {
                box.classList.remove("shake");
                void box.offsetWidth;
                box.classList.add("shake");
                setTimeout(() => box.classList.remove("shake"), 260);
              }
              try { if (navigator.vibrate) navigator.vibrate(80); } catch (e) {}
              return;
            }
            // 扣除星星并解锁（每个皮肤只能购买一次）
            STATE.stars -= SKIN_PRICE;
            if (kind === "plate") STATE.unlockedPlateSkins[color] = true;
            else STATE.unlockedChopSkins[color] = true;
            updateStarDisplay();
          }
          if (kind === "plate") STATE.currentPlateSkin = color;
          else {
            STATE.currentChopSkin = color;
            applyCurrentChopSkin();
          }
          saveProgressToStorage();
          // 重新渲染整个列表以刷新选中/锁定状态
          renderSkinList("chop", SKIN_CONFIG.chopColors, "shop-chop-pane");
          renderSkinList("plate", SKIN_CONFIG.plateColors, "shop-plate-pane");
        };

        listEl.appendChild(item);
      });

    function setRewardProgress(score, target) {
      const fill = document.getElementById("reward-progress-fill");
      const text = document.getElementById("reward-progress-text");
      const safeScore = Math.max(0, Math.floor(score || 0));
      const safeTarget = Math.max(0, Math.floor(target || 0));
      if (text) {
        text.textContent = t("分数 ", "Score ") + safeScore;
        text.style.color = "#8b451a";
      }
      if (fill) {
        const ratio = safeTarget > 0 ? Math.max(0, Math.min(1, safeScore / safeTarget)) : 0;
        fill.style.width = (ratio * 100).toFixed(1) + "%";
      }
      const starWrap = document.querySelector(".reward-star-thresholds .star-marker");
      if (starWrap) {
        const passNeed = (safeTarget > 0) ? Math.ceil(safeTarget * 0.6) : 0;
        if (safeTarget > 0 && safeScore >= passNeed) {
          starWrap.style.color = "#ffce3a";
          starWrap.style.textShadow = "0 0 4px rgba(255, 206, 58, 0.9), 0 0 8px rgba(255, 206, 58, 0.7)";
        } else {
          // 未达成时用和主进度条一样的深棕色，保证 60% 位置的 1 星始终可见
          starWrap.style.color = "#c45c3e";
          starWrap.style.textShadow = "none";
        }
      }
    }

    function cloneAssetToImgEl(imgName) {
      const asset = g_CroppedCanvas[imgName];
      if (!asset) return null;
      if (asset.tagName && asset.tagName.toLowerCase() === "img") {
        const im = asset.cloneNode();
        im.alt = "";
        return im;
      }
      // 兜底：用原始路径（同名资源必然在 img_trimmed 里）
      const im = document.createElement("img");
      im.src = "img_trimmed/" + encodeURIComponent(imgName);
      im.alt = "";
      return im;
    }

    function getRewardAssetPool() {
      // 奖励关素材库：只用“能夹起来”的图案：get_* / sushi_*，
      // 严格排除 dish_*（盘装菜）、water_*（水）、sauce_*（酱料）、sushiPlate_*（盘子本体）等
      const keys = Object.keys(g_CroppedCanvas || {});
      const pool = [];
      keys.forEach(k => {
        if (!k || typeof k !== "string") return;
        if (k.indexOf("+") !== -1) return; // 去掉蘸酱/组合
        if (k.startsWith("sauce_")) return;
        if (k.startsWith("water_")) return;
        if (k.startsWith("dish_")) return;
        if (k.startsWith("sushiPlate_")) return;
        // 盘子上的三件天妇罗不是“能夹起来的单个”，奖励关只用 get_sushi_tempera.PNG 那个单只版本
        if (k.startsWith("sushi_tempera_")) return;
        if (k.startsWith("frontChopstick_") || k.startsWith("backChopstick_")) return;
        if (!(k.startsWith("get_") || k.startsWith("sushi_"))) return;
        pool.push(k);
      });
      // 兜底：至少要有一些可用素材
      if (pool.length === 0) {
        return ["get_sushi_norm_salmon.PNG", "get_sushi_norm_tuna.PNG", "get_salmonSlice.PNG"]
          .filter(k => !!g_CroppedCanvas[k]);
      }
      return pool;
    }

    function startRewardLevelMiniGame(levelIndex) {
      stopSpecialMiniGame();
      const wrap = document.getElementById("reward-screen-content");
      if (!wrap) return;
      wrap.innerHTML = "";
      // 第10关接东西：不需要筷子层；第20关夹寿司：继续展示筷子层
      try {
        const inter = document.getElementById("interaction-layer");
        if (inter) {
          if (levelIndex === 10) inter.classList.add("menu-hidden");
          else inter.classList.remove("menu-hidden");
        }
      } catch (e) { }
      const cfg = getLevelConfig(levelIndex);
      const target = cfg && cfg.targetScore ? cfg.targetScore : (levelIndex === 10 ? 20 : 25);
      const durationSec = 30;
      const pool = getRewardAssetPool();
      const field = document.createElement("div");
      field.className = "special-playfield";
      field.style.position = "absolute";
      field.style.inset = "0";
      field.style.height = "100%";
      field.style.border = "none";
      field.style.borderRadius = "0";
      field.style.background = "linear-gradient(180deg, #fff8f2 0%, #ffe1d0 45%, #f5c89c 100%)";
      wrap.style.position = "relative";
      wrap.appendChild(field);

      const timerEl = document.createElement("div");
      timerEl.className = "reward-timer";
      timerEl.textContent = "0:30";
      field.appendChild(timerEl);

      // 通用结算：把分数写回 STATE.score，走现有关卡结算弹窗/存档
      function finishMiniGame(win) {
        stopSpecialMiniGame();
        STATE.score = score;
        STATE.playing = false;
        STATE.paused = false;
        if (!win) {
          showCustomModal("游戏失败，再试一次吧！", [
            { text: "再试一次", primary: true, cb: () => startRewardLevelMiniGame(levelIndex) },
            { text: "选择关卡", cb: () => openLevelScreen() }
          ]);
          return;
        }
        handleLevelFinish();
      }

      let score = 0;
      let timeLeft = durationSec;
      let running = false;
      let raf = 0;
      let spawnTimer = 0;
      const items = [];

      const rectOf = () => field.getBoundingClientRect();

      if (levelIndex === 10) {
        // 第10关：接东西
        const catcher = document.createElement("div");
        catcher.className = "catcher";
        // 在接取区域里放盘子图片（和自助/闯关用同一套盘子皮肤）
        const plateColor = (STATE.currentPlateSkin === "random")
          ? getRandomUnlockedPlateColor()
          : (STATE.currentPlateSkin || "black");
        const plateImgName = getPlateImgNameByColor(plateColor);
        if (g_CroppedCanvas[plateImgName]) {
          const plateInner = document.createElement("div");
          plateInner.style.position = "absolute";
          plateInner.style.inset = "0";
          plateInner.style.opacity = "0.95";
          const plateEl = cloneAssetToImgEl(plateImgName);
          if (plateEl) plateInner.appendChild(plateEl);
          catcher.appendChild(plateInner);
        }
        field.appendChild(catcher);
        let plateX = 0.5; // 0~1，归一化位置

        function setPlateFromClientX(clientX) {
          const r = rectOf();
          const x = (clientX - r.left) / Math.max(1, r.width);
          plateX = Math.max(0.06, Math.min(0.94, x));
        }
        field.onpointerdown = (e) => { e.preventDefault(); setPlateFromClientX(e.clientX); };
        field.onpointermove = (e) => { if (e.buttons) setPlateFromClientX(e.clientX); };

        function spawn() {
          const r = rectOf();
          const imgName = pool[Math.floor(Math.random() * pool.length)];
          const el = document.createElement("div");
          el.className = "special-item";
          const isBonus = Math.random() < 0.25;
          if (isBonus) el.classList.add("bonus");
          const im = cloneAssetToImgEl(imgName);
          if (im) el.appendChild(im);
          field.appendChild(el);
          const size = 56;
          const x = Math.random() * Math.max(1, (r.width - size));
          const y = -80;
          const baseSpeed = isBonus ? 260 : 140;
          const speed = baseSpeed + Math.random() * 220;
          items.push({ el, x, y, vy: speed, w: size, h: size, bonus: isBonus });
        }

        function tick(ts) {
          if (!running || STATE.paused) return;
          const r = rectOf();
          const dt = 1 / 60;
          // plate render
          const px = plateX * r.width;
          catcher.style.left = px + "px";
          const cr = catcher.getBoundingClientRect();
          const plateBox = {
            x: cr.left - r.left,
            y: cr.top - r.top,
            w: cr.width,
            h: cr.height
          };

          for (let i = items.length - 1; i >= 0; i--) {
            const it = items[i];
            it.y += it.vy * dt;
            it.el.style.transform = `translate(${it.x}px, ${it.y}px)`;
            // 接盘判定：落到盘子上沿附近
            const cx = it.x + it.w / 2;
            const cy = it.y + it.h;
            const hit = (cx >= plateBox.x && cx <= plateBox.x + plateBox.w && cy >= plateBox.y && cy <= plateBox.y + plateBox.h);
            if (hit) {
              const add = it.bonus ? 5 : ((Math.random() < 0.55) ? 1 : 2);
              score += add;
              setRewardProgress(score, target);
              const pop = document.createElement("div");
              pop.className = "special-pop";
              pop.innerText = `+${add}`;
              pop.style.left = (cx) + "px";
              pop.style.top = (it.y + it.h / 2) + "px";
              field.appendChild(pop);
              setTimeout(() => { try { pop.remove(); } catch (e) { } }, 560);
              it.el.remove();
              items.splice(i, 1);
              if (score < 0) { running = false; finishMiniGame(false); return; }
              continue;
            }
            if (it.y > r.height + 120) {
              // 漏接：普通 -5，金光不扣；负分立刻失败
              if (!it.bonus) {
                score -= 5;
                setRewardProgress(score, target);
                const pop = document.createElement("div");
                pop.className = "special-pop";
                pop.innerText = `-5`;
                pop.style.left = (Math.min(r.width - 12, Math.max(12, cx))) + "px";
                pop.style.top = (r.height - 40) + "px";
                pop.style.color = "#7b4a2a";
                field.appendChild(pop);
                setTimeout(() => { try { pop.remove(); } catch (e) { } }, 560);
                if (score < 0) { it.el.remove(); items.splice(i, 1); running = false; finishMiniGame(false); return; }
              }
              it.el.remove();
              items.splice(i, 1);
            }
          }

          raf = requestAnimationFrame(tick);
        }

        function start() {
          if (running) return;
          running = true;
          STATE.playing = true;
          STATE.paused = false;
          const spawnEveryMs = 650;
          spawnTimer = window.setInterval(() => { if (running && !STATE.paused && items.length < 6) spawn(); }, spawnEveryMs);
          raf = requestAnimationFrame(tick);
          const t = window.setInterval(() => {
            if (!running) { clearInterval(t); return; }
            if (STATE.paused) return;
            timeLeft--;
            timerEl.textContent = `0:${Math.max(0, timeLeft).toString().padStart(2, "0")}`;
            if (timeLeft <= 0) {
              running = false;
              clearInterval(t);
              clearInterval(spawnTimer);
              cancelAnimationFrame(raf);
              finishMiniGame(target > 0 && score >= Math.ceil(target * 0.6));
            }
          }, 1000);
          g_SpecialCleanup = () => {
            running = false;
            field.onpointerdown = null;
            field.onpointermove = null;
            try { clearInterval(spawnTimer); } catch (e) { }
            try { cancelAnimationFrame(raf); } catch (e) { }
            try { clearInterval(t); } catch (e) { }
            items.splice(0).forEach(it => { try { it.el.remove(); } catch (e) { } });
          };
        }

        // openRewardScreen 已经弹过“开始游戏”，这里直接开跑
        setRewardProgress(0, target);
        start();
        return;
      }

      // 第20关：夹寿司（点击消除得分）
      // 正常抛物线：飞到接近屏幕顶端再落下，占满整个高度，但节奏偏慢
      const gravity = 650;

      function showRewardGrabEffect(imgName, clientX, clientY) {
        const wrap = document.getElementById("chopsticks-wrap");
        const cf = document.getElementById("chop-food");
        const back = document.getElementById("chop-back");
        const front = document.getElementById("chop-front");
        if (!wrap || !cf || !back || !front) return;
        cf.innerHTML = "";
        wrap.classList.remove("holding-plate", "holding-drink");
        back.classList.remove("hidden");
        front.classList.remove("hidden");
        const cvs = cloneCanvas(imgName);
        if (!cvs) return;
        cf.appendChild(wrapAsHoldItem(cvs, imgName, 0.08, 1.48, "grab"));
        updateWrapPosition(clientX, clientY);
        window.setTimeout(function () {
          if (!STATE.playing) return;
          cf.innerHTML = "";
        }, 120);
      }

      function spawnChopItem() {
        const r = rectOf();
        const imgName = pool[Math.floor(Math.random() * pool.length)];
        const el = document.createElement("div");
        el.className = "special-item";
        const im = cloneAssetToImgEl(imgName);
        if (im) el.appendChild(im);
        field.appendChild(el);
        const size = 60;
        const x = Math.random() * Math.max(1, (r.width - size));
        const y = r.height + 40;
        // 横向速度：略小，主要是上下运动占满屏幕
        const vx = (Math.random() - 0.5) * 180;
        // 计算一个“目标顶点”：屏幕顶部附近（高度 10%~25% 之间）
        const apexY = r.height * (0.10 + Math.random() * 0.15);
        const dy = Math.max(40, (y - apexY));
        // 根据位移和重力反推初速度，保证大部分轨迹都能飞到接近屏幕顶端
        const baseVy = -Math.sqrt(2 * gravity * dy);
        // 略加一点随机波动，但保持整体节奏稳定
        const vy = baseVy * (0.92 + Math.random() * 0.16);
        const rot = (Math.random() - 0.5) * 220;
        const id = Math.random().toString(36).slice(2);
        el.dataset.id = id;
        const it = { id, el, x, y, vx, vy, rot, vr: rot, w: size, h: size, dead: false, srcName: imgName };
        el.onpointerdown = (e) => {
          e.preventDefault();
          if (it.dead) return;
          it.dead = true;
          const add = (Math.random() < 0.55) ? 1 : 2;
          score += add;
          setRewardProgress(score, target);
          const pop = document.createElement("div");
          pop.className = "special-pop";
          pop.innerText = `+${add}`;
          pop.style.left = (e.clientX - r.left) + "px";
          pop.style.top = (e.clientY - r.top) + "px";
          field.appendChild(pop);
          showRewardGrabEffect(it.srcName, e.clientX, e.clientY);
          setTimeout(() => { try { pop.remove(); } catch (e) { } }, 560);
          try { el.remove(); } catch (e2) { }
          // 立即从数组移除，避免出现“停住但不消失”
          const idx = items.findIndex(x => x && x.id === it.id);
          if (idx >= 0) items.splice(idx, 1);
        };
        items.push(it);
      }

      let lastTs = 0;
      function tickChop(ts) {
        if (!running) return;
        if (!lastTs) lastTs = ts;
        const dt = Math.min(0.03, (ts - lastTs) / 1000);
        lastTs = ts;
        const r = rectOf();
        for (let i = items.length - 1; i >= 0; i--) {
          const it = items[i];
          if (it.dead) { items.splice(i, 1); continue; }
          it.vy += gravity * dt;
          it.x += it.vx * dt;
          it.y += it.vy * dt;
          it.rot += it.vr * dt;
          // 边界反弹
          if (it.x < -20) { it.x = -20; it.vx *= -0.8; }
          if (it.x > r.width - 44) { it.x = r.width - 44; it.vx *= -0.8; }
          it.el.style.transform = `translate(${it.x}px, ${it.y}px) rotate(${it.rot}deg)`;
          if (it.y > r.height + 180) {
            it.el.remove();
            items.splice(i, 1);
          }
        }
        raf = requestAnimationFrame(tickChop);
      }

      function start20() {
        if (running) return;
        running = true;
        STATE.playing = true;
        STATE.paused = false;
        const spawnEveryMs = 650;
        spawnTimer = window.setInterval(() => {
          if (running && !STATE.paused && items.length < 8) spawnChopItem();
        }, spawnEveryMs);
        raf = requestAnimationFrame(tickChop);
        const t = window.setInterval(() => {
          if (!running) { clearInterval(t); return; }
          timeLeft--;
          if (timeLeft <= 0) {
            running = false;
            clearInterval(t);
            clearInterval(spawnTimer);
            cancelAnimationFrame(raf);
            finishMiniGame(target > 0 && score >= Math.ceil(target * 0.6));
          }
        }, 1000);
        g_SpecialCleanup = () => {
          running = false;
          try { clearInterval(spawnTimer); } catch (e) { }
          try { cancelAnimationFrame(raf); } catch (e) { }
          try { clearInterval(t); } catch (e) { }
          items.splice(0).forEach(it => {
            try { it.el.onpointerdown = null; } catch (e2) { }
            try { it.el.remove(); } catch (e2) { }
          });
        };
      }
      // openRewardScreen 已经弹过“开始游戏”，这里直接开跑（与第10关一致）
      setRewardProgress(0, target);
      start20();
    }

    function startChallengeMergeGame() {
      stopSpecialMiniGame();
      const wrap = document.getElementById("challenge-screen-content");
      if (!wrap) return;
      wrap.innerHTML = "";

      // 合成路径（从低到高）
      const CHAIN = [
        { key: "sushi_roll_salmon.PNG", label: "roll三文鱼" },
        { key: "sushi_california_crab.PNG", label: "加州卷crab" },
        { key: "sushi_norm_ikura.PNG", label: "norm鱼籽" },
        { key: "sushi_norm_shirmp.PNG", label: "norm蒸虾" },
        { key: "sushi_norm_salmon.PNG", label: "norm三文鱼" },
        { key: "sushi_norm_tuna.PNG", label: "norm金枪鱼" },
        { key: "get_salmonSlice.PNG", label: "三文鱼刺身片" },
        { key: "get_salmonBelly.PNG", label: "三文鱼腩" },
        { key: "sushi_salmonLove.PNG", label: "花之恋" }
      ].filter(x => !!g_CroppedCanvas[x.key]);
      // 若某些资源不存在，至少保底几个
      if (CHAIN.length < 5) {
        const fallback = ["sushi_norm_salmon.PNG", "sushi_norm_tuna.PNG", "get_salmonSlice.PNG", "get_salmonBelly.PNG", "sushi_salmonLove.PNG"]
          .filter(k => !!g_CroppedCanvas[k]).map(k => ({ key: k, label: k }));
        while (CHAIN.length < Math.min(5, fallback.length)) CHAIN.push(fallback[CHAIN.length]);
      }

      const GOAL_KEY = "sushi_norm_salmon.PNG";
      const goalIndex = Math.max(0, CHAIN.findIndex(x => x.key === GOAL_KEY));

      const top = document.createElement("div");
      top.className = "merge-top";
      const slotBest = document.createElement("div");
      slotBest.className = "slot";
      const slotNow = document.createElement("div");
      slotNow.className = "slot";
      const slotNext = document.createElement("div");
      slotNext.className = "slot";
      top.appendChild(slotBest);
      top.appendChild(slotNow);
      top.appendChild(slotNext);
      const gridEl = document.createElement("div");
      gridEl.className = "merge-grid";
      wrap.appendChild(top);
      wrap.appendChild(gridEl);

      const W = 7, H = 7;
      const grid = Array.from({ length: H }, () => Array.from({ length: W }, () => -1)); // 存 CHAIN index
      const cells = [];

      let highest = -1;
      let maxSeen = -1; // 当前已合成到的最高等级

      function rngItemIndex() {
        // 新图案最高允许出现到“当前最高等级的前一级”，并让低级鱼出现概率更高
        const cap = Math.max(0, maxSeen - 1);
        const upper = Math.max(0, Math.min(cap, CHAIN.length - 1));
        const u = Math.random();
        const v = Math.random();
        const r = u * v; // 越接近 0 的概率越高
        return Math.floor(r * (upper + 1));
      }

      let current = 0;
      let next = 0;
      function rollQueue() {
        if (maxSeen < 0) { current = 0; next = 0; return; }
        current = next;
        next = rngItemIndex();
      }
      function initQueue() {
        maxSeen = 0;
        current = 0;
        next = 0;
      }

      function updateTop() {
        // 左：最高；中：当前；右：下一个（图 + 标签）
        slotBest.innerHTML = "";
        const bestKey = (highest >= 0 && CHAIN[highest]) ? CHAIN[highest].key : CHAIN[0].key;
        const bestImg = cloneAssetToImgEl(bestKey);
        if (bestImg) slotBest.appendChild(bestImg);
        const bestTxt = document.createElement("div");
        bestTxt.className = "slot-label";
        bestTxt.innerText = t("最高", "Best");
        slotBest.appendChild(bestTxt);

        slotNow.innerHTML = "";
        const nowImg = cloneAssetToImgEl(CHAIN[current].key);
        if (nowImg) slotNow.appendChild(nowImg);
        const nowTxt = document.createElement("div");
        nowTxt.className = "slot-label";
        nowTxt.innerText = t("当前", "Now");
        slotNow.appendChild(nowTxt);

        slotNext.innerHTML = "";
        const nextImg = cloneAssetToImgEl(CHAIN[next].key);
        if (nextImg) slotNext.appendChild(nextImg);
        const nextTxt = document.createElement("div");
        nextTxt.className = "slot-label";
        nextTxt.innerText = t("下一个", "Next");
        slotNext.appendChild(nextTxt);
      }

      let merging = false;
      function animateMerge(group, tx, ty, fromValue, toValue) {
        return new Promise((resolve) => {
          const container = gridEl;
          const cr = container.getBoundingClientRect();
          const tBtn = cells[ty * W + tx];
          const tr = tBtn.getBoundingClientRect();
          const targetX = (tr.left - cr.left) + tr.width / 2;
          const targetY = (tr.top - cr.top) + tr.height / 2;
          const flyers = [];
          group.forEach(([gx, gy]) => {
            if (gx === tx && gy === ty) return;
            const b = cells[gy * W + gx];
            const br = b.getBoundingClientRect();
            const fx = (br.left - cr.left) + br.width / 2;
            const fy = (br.top - cr.top) + br.height / 2;
            const fly = document.createElement("div");
            fly.style.position = "absolute";
            fly.style.left = fx + "px";
            fly.style.top = fy + "px";
            fly.style.width = Math.max(10, br.width * 0.9) + "px";
            fly.style.height = Math.max(10, br.height * 0.9) + "px";
            fly.style.transform = "translate(-50%, -50%) scale(1)";
            fly.style.transition = "transform 260ms ease-out, opacity 260ms ease-out";
            fly.style.zIndex = "5";
            const im = cloneAssetToImgEl(CHAIN[fromValue].key);
            if (im) {
              im.style.width = "100%";
              im.style.height = "100%";
              im.style.objectFit = "contain";
              fly.appendChild(im);
            }
            container.appendChild(fly);
            flyers.push({ fly, fx, fy, targetX, targetY });
          });

          requestAnimationFrame(() => {
            flyers.forEach(({ fly, fx, fy, targetX, targetY }) => {
              const dx = targetX - fx;
              const dy = targetY - fy;
              fly.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0.4)`;
              fly.style.opacity = "0.15";
            });
          });

          window.setTimeout(() => {
            flyers.forEach(({ fly }) => { try { fly.remove(); } catch (e) { } });
            group.forEach(([gx, gy]) => {
              if (gx === tx && gy === ty) return;
              grid[gy][gx] = -1;
              updateCell(gx, gy);
            });
            grid[ty][tx] = toValue;
            setHighest(toValue);
            updateCell(tx, ty);
            resolve();
          }, 220);
        });
      }

      async function mergeChainAt(x, y) {
        let loopGuard = 0;
        while (loopGuard++ < 20) {
          const v = grid[y][x];
          if (v < 0) break;
          const group = floodSame(x, y, v);
          if (group.length < 3) break;
          const up = Math.min(CHAIN.length - 1, v + 1);
          await animateMerge(group, x, y, v, up);
          // 连续多段合成之间留一点间隔，让节奏更自然
          await new Promise(r => setTimeout(r, 90));
        }
      }

      function updateCell(x, y) {
        const idx = y * W + x;
        const btn = cells[idx];
        const v = grid[y][x];
        btn.innerHTML = "";
        if (v >= 0 && CHAIN[v]) {
          btn.classList.add("filled");
          const im = cloneAssetToImgEl(CHAIN[v].key);
          if (im) btn.appendChild(im);
        } else {
          btn.classList.remove("filled");
        }
      }

      function neighbors4(x, y) {
        const out = [];
        if (x > 0) out.push([x - 1, y]);
        if (x < W - 1) out.push([x + 1, y]);
        if (y > 0) out.push([x, y - 1]);
        if (y < H - 1) out.push([x, y + 1]);
        return out;
      }

      function floodSame(x0, y0, value) {
        const stack = [[x0, y0]];
        const seen = new Set();
        const group = [];
        while (stack.length) {
          const [x, y] = stack.pop();
          const k = x + "," + y;
          if (seen.has(k)) continue;
          seen.add(k);
          if (grid[y][x] !== value) continue;
          group.push([x, y]);
          neighbors4(x, y).forEach(([nx, ny]) => stack.push([nx, ny]));
        }
        return group;
      }

      function anyEmpty() {
        for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) if (grid[y][x] < 0) return true;
        return false;
      }

      function setHighest(v) {
        if (v > highest) highest = v;
        if (v > maxSeen) maxSeen = v;
        updateChallengeProgress();
      }

      function updateChallengeProgress() {
        const maxLevel = Math.max(1, CHAIN.length - 1);
        const ratio = Math.max(0, Math.min(1, highest / maxLevel));
        const fill = document.getElementById("challenge-progress-fill");
        const text = document.getElementById("challenge-progress-text");
        if (fill) fill.style.width = (ratio * 100).toFixed(1) + "%";
        const stars = starsFromHighest();
        if (text) text.textContent = isEN() ? `Best ★${stars}` : `最高 ★${stars}`;
        const starWrap = document.getElementById("challenge-star-thresholds");
        if (starWrap) {
          const nodes = starWrap.querySelectorAll(".star-marker");
          nodes.forEach((n, idx) => {
            if (idx < stars) {
              n.style.color = "#ffce3a";
              n.style.textShadow = "0 0 4px rgba(255, 206, 58, 0.9), 0 0 8px rgba(255, 206, 58, 0.7)";
            } else {
              n.style.color = "#e0c8a0";
              n.style.textShadow = "none";
            }
          });
        }
        const topRight = document.querySelector("#screen-challenge .reward-top-right");
        if (topRight) {
          topRight.innerHTML = "";
        if (stars >= 1) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "icon-btn challenge-finish-btn";
          btn.textContent = t("完成", "Finish");
            btn.onclick = function () {
              finishChallenge(true);
            };
            topRight.appendChild(btn);
          }
        }
      }

      function settleAndMaybeWin() {
        // 失败：没有空格可放（按规则：格子全满直接失败）
        if (!anyEmpty()) {
          finishChallenge(false);
          return true;
        }
        return false;
      }

      function starsFromHighest() {
        // 1星=norm三文鱼；2=norm金枪鱼；3=刺身片；4=三文鱼腩；5=花之恋
        const key = (highest >= 0 && CHAIN[highest]) ? CHAIN[highest].key : "";
        if (key === "sushi_salmonLove.PNG") return 5;
        if (key === "get_salmonBelly.PNG") return 4;
        if (key === "get_salmonSlice.PNG") return 3;
        if (key === "sushi_norm_tuna.PNG") return 2;
        if (key === "sushi_norm_salmon.PNG") return 1;
        // 若资源链缺失，按等级映射保底
        return Math.max(0, Math.min(5, highest + 1));
      }

      function finishChallenge(win) {
        stopSpecialMiniGame();
        const stars = starsFromHighest();
        const prev = Math.max(0, Math.min(5, STATE.challengeBestStars || 0));
        if (stars > prev) {
          STATE.challengeBestStars = stars;
          const delta = stars - prev;
          if (delta > 0) {
            STATE.stars += delta;
            updateStarDisplay();
          }
          saveProgressToStorage();
        }
        renderLevelGrid();
        const filled = Math.max(0, Math.min(5, STATE.challengeBestStars || 0));
        const empty = 5 - filled;
        const starHtml =
          `<span style="color:#ffb400;font-size:1.6rem;">${"★".repeat(filled)}</span>` +
          `<span style="color:#e0c8a0;font-size:1.6rem;">${"★".repeat(empty)}</span>`;
        const title = win
          ? t("挑战完成！", "Challenge Cleared!")
          : t("挑战失败～", "Challenge Failed");
        const msg = `${title}<br>` + starHtml;
        showCustomModal(msg, [
          { text: t("再玩一次", "Play Again"), primary: true, cb: () => startChallengeMergeGame() },
          { text: t("选择关卡", "Select Level"), cb: () => openLevelScreen() },
          { text: t("返回标题", "Back to Title"), fullWidth: true, cb: goToTitle }
        ]);
      }

      async function placeAt(x, y) {
        if (merging) return;
        if (grid[y][x] >= 0) return;
        grid[y][x] = current;
        setHighest(current);
        updateCell(x, y);
        merging = true;
        try {
          await mergeChainAt(x, y);
        } finally {
          merging = false;
        }
        // 出下一个
        rollQueue();
        updateTop();
        settleAndMaybeWin();
      }

      // 初始化 UI
      initQueue();
      highest = -1;
      setHighest(0);
      next = rngItemIndex();
      updateTop();
      updateChallengeProgress();

      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "merge-cell";
          btn.onpointerdown = (e) => { e.preventDefault(); placeAt(x, y); };
          gridEl.appendChild(btn);
          cells.push(btn);
          updateCell(x, y);
        }
      }

      g_SpecialCleanup = () => {
        cells.forEach(c => { try { c.onpointerdown = null; } catch (e) { } });
      };

      // 开始弹窗：带 salmon roll 图标
      const iconKey = "sushi_roll_salmon.PNG";
      let modalHtml = `<div style="font-weight:bold;margin-bottom:8px;">${t("鱼鱼合成", "Fish Fusion")}</div>`;
      if (g_CroppedCanvas[iconKey]) {
        modalHtml += `<div class="modal-new-items"><div class="modal-new-item">`;
        const c = cloneAssetToImgEl(iconKey);
        if (c && c.childNodes && c.childNodes.length) {
          const wrapper = document.createElement("div");
          wrapper.className = "modal-new-items";
        }
        modalHtml += `<img src="img_trimmed/${iconKey}" alt="">`;
        modalHtml += `</div></div>`;
      }
      modalHtml += `<p style="margin-top:8px;">${t("3 个以上相同会合成！", "3 or more identical tiles will merge!")}</p>`;
      showCustomModal(modalHtml, [
        { text: t("开始游戏", "Start Game"), primary: true, cb: () => { document.getElementById("custom-modal").classList.remove("visible"); } }
      ]);
    }

    function initSkinShop() {
      updateStarDisplay();
      const btnShop = document.getElementById("btn-shop");
      if (btnShop) btnShop.onclick = () => openSkinShop("chop");
      const tabChop = document.getElementById("shop-tab-chop");
      const tabPlate = document.getElementById("shop-tab-plate");
      const closeBtn = document.getElementById("shop-close-btn");
      if (tabChop) tabChop.onclick = () => setShopActiveTab("chop");
      if (tabPlate) tabPlate.onclick = () => setShopActiveTab("plate");
      if (closeBtn) closeBtn.onclick = () => closeSkinShop();
    }

    // UI DOM references setup when game starts
    let $DOM = {};

    function openSpecialScreen() {
      showView("special");
    }
    function closeSpecialScreen() {
      showView("menu");
    }
    /** 统一页面切换：只显示指定视图，其余全部隐藏。避免多屏同时存在导致“没真正跳转”。 */
    function showView(viewId) {
      const menu = document.getElementById("menu");
      const game = document.getElementById("game");
      const levelScreen = document.getElementById("level-screen");
      const specialScreen = document.getElementById("screen-special");
      const rewardScreen = document.getElementById("screen-reward");
      const challengeScreen = document.getElementById("screen-challenge");
      if (menu) menu.classList.add("hidden");
      if (game) game.classList.add("hidden");
      if (levelScreen) levelScreen.classList.remove("visible");
      if (specialScreen) specialScreen.classList.remove("visible");
      if (rewardScreen) rewardScreen.classList.remove("visible");
      if (challengeScreen) challengeScreen.classList.remove("visible");
      switch (viewId) {
        case "menu":
          if (menu) menu.classList.remove("hidden");
          break;
        case "game":
          if (game) game.classList.remove("hidden");
          break;

    const WANT_TIMER_SPEED = 15;
    const FRIEND_TIMER_BASE = 20;

    function getCountMultiplier(count) {
      if (!count || count <= 1) return 1;
      if (count === 2) return 1.5;
      return 2;
    }

    function getTimedGroupLimit(baseSeconds, group) {
      if (!group) return baseSeconds;
      const c = (group.baseCount != null ? group.baseCount : (group.count != null ? group.count : 1));
      return baseSeconds * getCountMultiplier(c);
    }

    function updateSpeedModeTimerBars() {
      if ((STATE.mode !== "speed" && STATE.mode !== "level") || !STATE.wantDeadlines) return;
      for (var i = 0; i <= 1; i++) {
        var t = document.getElementById("want-timer-" + i);
        if (!t || STATE.wantDeadlines[i] == null) continue;
        var maxSec = getTimedGroupLimit(WANT_TIMER_SPEED, STATE.wantsCurrent && STATE.wantsCurrent[i]);
        var pct = maxSec > 0 ? Math.max(0, STATE.wantDeadlines[i]) / maxSec : 0;
        t.classList.toggle("urgent", pct < 0.25);
        var fill = t.querySelector(".fill");
        if (fill) fill.style.height = ((1 - pct) * 100) + "%";
      }
    }

        STATE.friendsWants.push(generateOrder());

      if (b4) b4.style.display = n >= 4 ? "flex" : "none";
      renderFriendsBubbles();
      renderWants();
    }
    /** 严格查图：只允许从“已预加载的真实文件名”里取，不猜、不试错。 */
    function getStrictIconPngByRaw(raw) {

      if (raw === "wb") return (g_CroppedCanvas && g_CroppedCanvas["sauce_soyWasabi.PNG"]) ? "sauce_soyWasabi.PNG" : null;
      if (raw === "lz") return (g_CroppedCanvas && g_CroppedCanvas["sauce_laozhi.PNG"]) ? "sauce_laozhi.PNG" : null;
      if (raw === "mayo") return (g_CroppedCanvas && g_CroppedCanvas["sauce_mayo.PNG"]) ? "sauce_mayo.PNG" : null;
      if (raw === "egg") return (g_CroppedCanvas && g_CroppedCanvas["sauce_egg.PNG"]) ? "sauce_egg.PNG" : null;
      if (raw === "on") return (g_CroppedCanvas && g_CroppedCanvas["sauce_on.PNG"]) ? "sauce_on.PNG" : null;
      // seaweed 在订单里是“原料”：显示海苔碟子（不是夹起来 get_seaweed.PNG）
      if (raw === "seaweed") {
        return (g_CroppedCanvas && g_CroppedCanvas["sauce_seaweed.PNG"]) ? "sauce_seaweed.PNG" : null;
      }

      // dish bases (订单原料用 get_* 单图)
      if (raw === "salmon_belly") return (g_CroppedCanvas && g_CroppedCanvas["get_salmonBelly.PNG"]) ? "get_salmonBelly.PNG" : null;
      if (raw === "salmon_noodle") return (g_CroppedCanvas && g_CroppedCanvas["get_salmonNoodle.PNG"]) ? "get_salmonNoodle.PNG" : null;
      if (raw === "salmonCube") return (g_CroppedCanvas && g_CroppedCanvas["get_salmonCube.PNG"]) ? "get_salmonCube.PNG" : null;
      if (raw === "salmonSlice") return (g_CroppedCanvas && g_CroppedCanvas["get_salmonSlice.PNG"]) ? "get_salmonSlice.PNG" : null;
      if (raw === "beef") return (g_CroppedCanvas && g_CroppedCanvas["get_beef.PNG"]) ? "get_beef.PNG" : null;
      if (raw === "fryRice") return (g_CroppedCanvas && g_CroppedCanvas["get_fryRice.PNG"]) ? "get_fryRice.PNG" : null;

      if (raw === "salmonLove") return (g_CroppedCanvas && g_CroppedCanvas["get_sushi_salmonLover.PNG"]) ? "get_sushi_salmonLover.PNG" : null;

      if (raw && raw.indexOf("norm_") === 0) {

    /** 饭友气泡/订单展示：raw 原料名 -> 严格 PNG（必须真实存在） */
    function mapRawToImgForFriend(raw) {

    }
    /** 展示归一化：wb(芥末) 与 soy(酱油)同时存在时，只显示“芥末酱油”(wb)，不再单独显示 soy */
    function normalizeItemsForDisplay(items) {
      if (!items || !items.length) return items || [];
      // 先做逻辑归一化（拆分+去重+排序），再做展示归一化，保证规则统一
      const normalized = normalizeGroupItems(items);
      const base = normalized[0];
      const rest = normalized.slice(1);
      const set = new Set(rest);
      if (set.has("wb") && set.has("soy")) {
        // wb 的图标本身就是“芥末酱油”，所以 soy 不再显示
        const filtered = rest.filter(x => x !== "soy");
        return [base].concat(filtered);
      }
      return normalized;
    }
    function renderFriendsBubbles() {
      if (!isFriendsActive() || !STATE.friendsWants) return;
      const cooldown = STATE.friendsCooldown || [0, 0];
      function renderOne(wantId, timerId, want, remaining, cooldownSec) {
        const el = document.getElementById(wantId);
        if (!el) return;
        el.innerHTML = "";
        if (cooldownSec > 0) {
          // 在吃饭：不显示 bar，只在格子里竖排写大字「吃吃吃中...」
          var eatWrap = document.createElement("div");
          eatWrap.style.display = "flex";
          eatWrap.style.alignItems = "center";
          eatWrap.style.justifyContent = "center";
          eatWrap.style.height = "100%";
          var eatText = document.createElement("div");
          eatText.textContent = t("吃吃吃中...", "Eating...");
          eatText.style.writingMode = "vertical-rl";
          eatText.style.textOrientation = "upright";
          eatText.style.fontSize = "0.78rem";
          eatText.style.color = "#c45c3e";
          eatText.style.fontWeight = "bold";
          eatWrap.appendChild(eatText);
          el.appendChild(eatWrap);
        } else if (want && want.items && want.items.length) {
          var items = normalizeItemsForDisplay(want.items);
          var count = (want.count != null && want.count > 0) ? want.count : 1;
          var isDrink = items.length && ["hu", "cha", "orange", "coke", "calpis"].includes(items[0]);
          var nodes = [];
          items.forEach((raw) => {
            var wrap = document.createElement("div");
            wrap.className = "friend-want-item";
            var imgName = mapRawToImgForFriend(raw);
            if (imgName && g_CroppedCanvas && g_CroppedCanvas[imgName]) {
              var c = cloneCanvas(imgName);
              if (c) wrap.appendChild(c);
            }
            if (wrap.childNodes && wrap.childNodes.length) nodes.push(wrap);
          });
          nodes.forEach((wrap, idx) => {
            el.appendChild(wrap);
            if (nodes.length > 1 && idx < nodes.length - 1) {
              var plus = document.createElement("span");
              plus.className = "friend-want-plus";
              plus.textContent = "+";
              el.appendChild(plus);
            }
          });
          if (count > 1 && !isDrink) {
            var xn = document.createElement("span");
            xn.className = "friend-want-xn";
            xn.textContent = "×" + count;
            el.appendChild(xn);
          }
        }
        const timerEl = document.getElementById(timerId);
        if (timerEl) {
          if (cooldownSec > 0 || (remaining != null && remaining <= 0)) {
            timerEl.style.display = "none";
            timerEl.innerHTML = "";
          } else {
            timerEl.style.display = "";
            const maxSec = getTimedGroupLimit(FRIEND_TIMER_BASE, want);
            const pct = maxSec > 0 ? Math.max(0, Math.min(1, (remaining || 0) / maxSec)) : 0;
            const fillPct = (1 - pct) * 100;
            var fill = timerEl.querySelector(".fill");
            if (!fill) {
              fill = document.createElement("div");
              fill.className = "fill";
              timerEl.appendChild(fill);
            }
            fill.style.height = fillPct + "%";
            if (pct < 0.25) timerEl.classList.add("urgent"); else timerEl.classList.remove("urgent");
          }
        }
      }
      var ids = [["friend-want-left","friend-timer-left"], ["friend-want-right","friend-timer-right"], ["friend-want-3","friend-timer-3"], ["friend-want-4","friend-timer-4"]];
      var n = Math.min(getActiveFriendsCount() || 2, 4);
      for (var i = 0; i < n; i++) {
        if (ids[i] && document.getElementById(ids[i][0])) {
          renderOne(ids[i][0], ids[i][1], STATE.friendsWants[i], STATE.friendsDeadlines[i], cooldown[i]);
        }
      }
    }

    function cloneCanvasSafe(srcName) {
      return cloneCanvas(srcName);
    }

    function getChopGrabPointOrig() {
      const m = window.TRIM_METADATA && window.TRIM_METADATA["frontChopstick_black.PNG"];
      if (!m) return { x: 1000, y: 1000 };
      // 经验点：靠近前筷子夹点（可微调）
      // 再往左下挪（按你说的“往左往下”）
      // 左下：x 更小，y 更大（大调整）
      return { x: m.x + m.w * -0.8,y: m.y + m.h * 1.3};
    }

    function wrapAsHoldItem(node, srcName, scale, sizeScale, alignMode) {
      const meta = window.TRIM_METADATA && window.TRIM_METADATA[srcName];
      const baseW = meta && meta.w ? meta.w : 300;
      const baseH = meta && meta.h ? meta.h : 300;
      const origW = meta && meta.origW ? meta.origW : baseW;
      const origH = meta && meta.origH ? meta.origH : baseH;
      const x = meta && typeof meta.x === "number" ? meta.x : 0;
      const y = meta && typeof meta.y === "number" ? meta.y : 0;
      const wrap = document.createElement("div");
      wrap.className = "hold-item";
      wrap.style.width = "160px";
      wrap.style.height = "160px";

      const inner = document.createElement("div");
      inner.className = "hold-inner";
      inner.style.width = Math.max(1, Math.round(baseW * scale)) + "px";
      inner.style.height = Math.max(1, Math.round(baseH * scale)) + "px";
      const s = (typeof sizeScale === "number" ? sizeScale : 1);
      inner.style.transform = `scale(${s})`;
      inner.style.transformOrigin = "center top";

      const mode = alignMode || "grab";
      if (mode === "center") {
        // 筷子隐藏时：让物体本身居中在鼠标（不按筷子夹点对齐）
        const w = Math.round(baseW * scale);
        const h = Math.round(baseH * scale);
        inner.style.left = Math.round((160 - w) / 2) + "px";
        inner.style.top = Math.round((160 - h) / 2) + "px";
      } else {
        // 筷子夹取：按 2000 原始坐标与前筷子夹点对齐
        const grab = getChopGrabPointOrig();
        const itemCenterX = x + baseW / 2;
        const itemCenterY = y + baseH / 2;
        const dx = grab.x - itemCenterX;
        const dy = grab.y - itemCenterY;
        inner.style.left = Math.round((x + dx) * scale) + "px";
        inner.style.top = Math.round((y + dy) * scale) + "px";
      }
      if (node) inner.appendChild(node);
      wrap.appendChild(inner);
      return wrap;
    }

    function cloneCanvas(srcName) {
      const og = g_CroppedCanvas[srcName];
      if (!og) return document.createElement("div");

      if (og.tagName && og.tagName.toLowerCase() === "img") {
        const wrap = document.createElement("div");
        wrap.className = "canvas-placeholder";
        wrap.style.width = "100%"; wrap.style.height = "100%";
        const im = og.cloneNode();
        im.style.width = "100%"; im.style.height = "100%"; im.style.objectFit = "contain";
        wrap.appendChild(im);
        return wrap;
      }

      try {
        const cvs = document.createElement("canvas");
        cvs.width = og.width; cvs.height = og.height;
        cvs.getContext("2d").drawImage(og, 0, 0);
        return cvs;
      } catch (e) {
        return document.createElement("div");
      }
    }

    // 想吃/下一个可能性：1水(茶壶可乐等瓶)，2东西，3东西+酱料。仅指导.txt里有图的组合。酱油/芥末酱油/捞汁三选一，美乃滋/温泉蛋/洋葱/海苔四选一，最多3个。
    const MOD_ORDER = ["soy", "wb", "lz", "mayo", "egg", "on", "seaweed"];

    /** 统一归一化订单 items：拆分 "soy+wb" 这种 token、去重、按 MOD_ORDER 排序，彻底杜绝 soy+soy+wb */
    function normalizeGroupItems(items) {
      if (!items || !items.length) return items;
      const base = items[0];
      const seen = new Set();
      const mods = [];
      for (let i = 1; i < items.length; i++) {
        const tok = items[i];
        if (!tok) continue;
        const parts = String(tok).split("+").filter(Boolean);
        for (let p of parts) {
          if (!p) continue;
          if (seen.has(p)) continue;
          seen.add(p);
          mods.push(p);
        }
      }
      mods.sort((a, b) => MOD_ORDER.indexOf(a) - MOD_ORDER.indexOf(b));
      return [base].concat(mods);
    }

    // 检查蘸料组合是否合法：
    // - 酱油/芥末酱油(wb)/捞汁 三者中最多只能出现一种
    // - 洋葱(on)/温泉蛋(egg)/美乃滋(mayo)/海苔(seaweed) 四者中最多只能出现一种
    function isValidSauceCombination(mods) {
      if (!mods || !mods.length) return true;
      const set = new Set(mods);
      // 指导.txt：芥末酱油是「soy+wb」一组，允许 soy 与 wb 同时出现（但 wb 不能单独出现）
      const hasSoy = set.has("soy");
      const hasWb = set.has("wb");
      const hasLz = set.has("lz");
      if (hasWb && !hasSoy) return false;
      if (hasLz && (hasSoy || hasWb)) return false; // 捞汁不能与酱油/芥末酱油同存
      const group1Count = (hasLz ? 1 : 0) + (hasSoy ? 1 : 0); // soy(+wb) 算 1 种
      const group2Count = ["mayo", "egg", "on", "seaweed"].filter(k => set.has(k)).length;
      return group1Count <= 1 && group2Count <= 1;
    }
    /** 订单 items 数组 -> 指导.txt 中的文件名。与 ASSETS_BY_GUIDE 一致，盘装 belly/noodle、寿司 Love/tempera 已做别名。 */
    function wantToImgName(arr) {
      if (!arr || arr.length === 0) return null;
      const base = arr[0];
      const mods = arr.slice(1).sort((a, b) => MOD_ORDER.indexOf(a) - MOD_ORDER.indexOf(b));
      const modStr = mods.length ? "+" + mods.join("+") : "";
      if (["hu", "cha", "orange", "coke", "calpis"].includes(base)) return `water_${base}.PNG`;
      // 海苔：盘装三文鱼(slice/cube/noodle/belly)可加海苔；寿司只能和 norm_shirmp/norm_tuna/norm_salmon 加海苔，与 mayo/egg/on 互斥
      const canHaveSeaweed = ["salmon_belly", "salmonCube", "salmon_noodle", "salmonSlice"].includes(base)
        || ["norm_shirmp", "norm_tuna", "norm_salmon"].includes(base);
      if (mods.includes("seaweed") && canHaveSeaweed) return "get_seaweed.PNG";
      const dishBase = { salmon_belly: "salmonBelly", salmon_noodle: "salmonNoodle" }[base] || base;
      if (["beef", "fryRice", "salmon_belly", "salmonCube", "salmon_noodle", "salmonSlice"].includes(base))
        return `get_${dishBase}${modStr}.PNG`;
      const sushiBase = base === "salmonLove" ? "salmonLover" : (base === "tempera_mid" ? "tempera" : base);
      return `get_sushi_${sushiBase}${modStr}.PNG`;
    }
    /** 订单组合池（手写维护）：每个调料、每个单品都单独列出；顺序不重要，可反着蘸；芥末酱油等效 soy+wb */
    function buildAllValidCombos() {
      const list = [];
      const seen = new Set();

      // 单个（基础）池：每个都单独维护
      const DRINK_BASES = ["hu", "cha", "orange", "coke", "calpis"];
      const DISH_SALMON_BASES = ["salmonSlice", "salmon_belly", "salmonCube", "salmon_noodle"];
      const SUSHI_NORM_BASES = [
        "norm_corn", "norm_crab", "norm_eel", "norm_egg", "norm_ikura",
        "norm_salmon", "norm_seaweed", "norm_shirmp", "norm_tuna",
        "norm_salmon_aburi", "norm_salmon_aburiMayo", "norm_salmon_aburiMayIkura"
      ];
      const SUSHI_SPECIAL_BASES = ["salmonLove", "tempera_mid"];

      // 每个调料单独维护
      const SAUCE_NONE = [];
      const SAUCE_SOY = ["soy"];
      const SAUCE_SOY_WB = ["soy", "wb"]; // 芥末酱油（等效于先酱油再芥末酱油）
      const SAUCE_LZ = ["lz"];
      const SAUCE_MAYO = ["mayo"];
      const SAUCE_EGG = ["egg"];
      const SAUCE_ON = ["on"];
      const SAUCE_SEAWEED = ["seaweed"];

      function pushCombo(base, mods) {
        // 任何情况下都不允许重复调料（例如 soy+soy+wb）；“等效”只体现在操作替换上，最终状态必须归一化成 soy+wb
        const uniq = [];
        const seenMod = new Set();
        (mods || []).forEach(m => {
          if (!m) return;
          if (seenMod.has(m)) return;
          seenMod.add(m);
          uniq.push(m);
        });
        const m = uniq.sort((a, b) => MOD_ORDER.indexOf(a) - MOD_ORDER.indexOf(b));
        if (!isValidSauceCombination(m)) return;
        const combo = [base].concat(m);
        const imgName = wantToImgName(combo);
        if (!imgName || !g_CroppedCanvas[imgName]) return; // 只允许“真实存在的图”
        const key = base + "|" + m.join(",");
        if (seen.has(key)) return;
        seen.add(key);
        list.push(combo);
      }

      // 饮料：只单个
      DRINK_BASES.forEach(b => pushCombo(b, SAUCE_NONE));

      // beef：单个、+egg；fryRice：单个
      pushCombo("beef", SAUCE_NONE);
      pushCombo("beef", SAUCE_EGG);
      pushCombo("fryRice", SAUCE_NONE);

      // 三文鱼盘装：单个 + 第一类(soy / soy+wb / lz) + 第二类(mayo/egg/on/seaweed)（最多各一）
      DISH_SALMON_BASES.forEach(base => {
        // 单个
        pushCombo(base, SAUCE_NONE);

        // 第一类汁
        pushCombo(base, SAUCE_SOY);
        pushCombo(base, SAUCE_SOY_WB);
        pushCombo(base, SAUCE_LZ);

        // 第二类料
        pushCombo(base, SAUCE_MAYO);
        pushCombo(base, SAUCE_EGG);
        pushCombo(base, SAUCE_ON);
        pushCombo(base, SAUCE_SEAWEED);

        // 组合：第一类 + (mayo/egg/on)
        [SAUCE_SOY, SAUCE_SOY_WB, SAUCE_LZ].forEach(s1 => {
          [SAUCE_MAYO, SAUCE_EGG, SAUCE_ON].forEach(s2 => pushCombo(base, s1.concat(s2)));
        });

        // 组合：第一类 + seaweed（海苔与 mayo/egg/on 互斥，但不与 soy/soy+wb/lz 互斥）
        [SAUCE_SOY, SAUCE_SOY_WB, SAUCE_LZ].forEach(s1 => {
          pushCombo(base, s1.concat(SAUCE_SEAWEED));
        });
      });

      // 寿司：单个 + soy + soy+wb
      SUSHI_NORM_BASES.concat(SUSHI_SPECIAL_BASES).forEach(base => {
        pushCombo(base, SAUCE_NONE);
        pushCombo(base, SAUCE_SOY);
        pushCombo(base, SAUCE_SOY_WB);
      });

      // 海苔寿司限定：norm_shirmp / norm_tuna / norm_salmon
      ["norm_shirmp", "norm_tuna", "norm_salmon"].forEach(base => {
        pushCombo(base, SAUCE_SEAWEED);
        pushCombo(base, SAUCE_SOY.concat(SAUCE_SEAWEED));
        pushCombo(base, SAUCE_SOY_WB.concat(SAUCE_SEAWEED));
      });

      return list;
    }
    let AllCombos = [];
    function generateWants() {
      if (!STATE.wantsNext || STATE.wantsNext.length === 0)
        STATE.wantsNext = [generateOrder(), generateOrder(), generateOrder()];
      STATE.wantsCurrent = STATE.wantsNext.slice(0, 2);
      STATE.wantsNext = STATE.wantsNext.slice(2);
      if (STATE.wantsNext.length === 0) STATE.wantsNext = [generateOrder()];
      while (STATE.wantsCurrent.length < 2) {
        STATE.wantsCurrent.push(STATE.wantsNext[0]);
        STATE.wantsNext = [generateOrder()];
      }
      renderWants();
    }

    /** 数量：正常多为1个。寿司1/2平分；4pc、3pc 的 1 比 2/3/4 概率高 */
    function wantCountForCombo(items) {
      if (!items || !items.length) return 1;
      const base = items[0];
      if (["hu", "cha", "orange", "coke", "calpis"].includes(base)) return 1;
      const r = Math.random();
      if (base === "tempera_mid") {
        if (r < 0.55) return 1;
        if (r < 0.85) return 2;
        return 3;
      }
      if (base.indexOf("roll_") === 0 || base.indexOf("california_") === 0) {
        if (r < 0.5) return 1;
        if (r < 0.78) return 2;
        if (r < 0.93) return 3;
        return 4;
      }
      if (["norm_corn", "norm_crab", "norm_eel", "norm_egg", "norm_ikura", "norm_salmon", "norm_seaweed", "norm_shirmp", "norm_tuna",
        "norm_salmon_aburi", "norm_salmon_aburiMayo", "norm_salmon_aburiMayIkura", "salmonLove"].includes(base))
        return r < 0.5 ? 1 : 2;
      if (["salmonSlice", "salmon_belly", "salmonCube", "salmon_noodle", "beef", "fryRice"].includes(base))
        return r < 0.5 ? 1 : 2;
      return 1;
    }
    /** 闯关模式：仅从当前关卡解锁的组合中抽取；自助模式用全局 AllCombos */
    function getOrderComboPool() {
      if (STATE.mode !== "level") return AllCombos;
      const cfg = getLevelConfig(STATE.currentLevelIndex || 1);
      if (!cfg) return AllCombos;
      const allowed = AllCombos.filter(arr => isComboAllowedInLevel(arr, cfg));
      if (allowed.length > 0) return allowed;
      const d = (cfg.unlockedDrinks || [])[0];
      const p = (cfg.unlockedDishes || [])[0];
      const c = (cfg.unlockedConveyor || [])[0];
      if (d) return [[d]];
      if (p) return [[p]];
      if (c) return [[c]];
      return [["fryRice"]];
    }

    // 闯关出题加权：本关新出现的内容更常被抽到
    const LEVEL_NEW_BASE_WEIGHT = 3.0;   // 本关新增“主物品”（饮料/盘装/回转寿司）倍率
    const LEVEL_NEW_SAUCE_WEIGHT = 2.2;  // 本关新增“调料”倍率

    function getNewUnlockSetsForLevel(levelIndex) {
      const curr = getLevelConfig(levelIndex || 1);
      if (!curr) return null;
      const prev = getLevelConfig(Math.max(1, (levelIndex || 1) - 1));
      const diff = (arr, prevArr) => {
        const p = new Set(prevArr || []);
        return new Set((arr || []).filter(x => !p.has(x)));
      };
      return {
        newDrinks: diff(curr.unlockedDrinks, prev && prev.unlockedDrinks),
        newDishes: diff(curr.unlockedDishes, prev && prev.unlockedDishes),
        newConveyor: diff(curr.unlockedConveyor, prev && prev.unlockedConveyor),
        newSauces: diff(curr.unlockedSauces, prev && prev.unlockedSauces)
      };
    }

    function pickComboWeighted(pool, levelIndex) {
      if (!pool || !pool.length) return null;
      if (STATE.mode !== "level") return pool[Math.floor(Math.random() * pool.length)];
      const sets = getNewUnlockSetsForLevel(levelIndex);
      if (!sets) return pool[Math.floor(Math.random() * pool.length)];

      const weights = new Array(pool.length);
      let total = 0;
      for (let i = 0; i < pool.length; i++) {
        const combo = pool[i];
        if (!combo || !combo.length) { weights[i] = 0; continue; }
        const base = combo[0];
        const mods = combo.slice(1);
        let w = 1;
        const isNewBase = sets.newDrinks.has(base) || sets.newDishes.has(base) || sets.newConveyor.has(base);
        if (isNewBase) w *= LEVEL_NEW_BASE_WEIGHT;
        let hasNewSauce = false;
        for (let m = 0; m < mods.length; m++) {
          if (sets.newSauces.has(mods[m])) { hasNewSauce = true; break; }
        }
        if (hasNewSauce) w *= LEVEL_NEW_SAUCE_WEIGHT;
        weights[i] = w;
        total += w;
      }

      if (!(total > 0)) return pool[Math.floor(Math.random() * pool.length)];
      let r = Math.random() * total;
      for (let i = 0; i < pool.length; i++) {
        r -= weights[i];
        if (r <= 0) return pool[i];
      }
      return pool[pool.length - 1];
    }

    /** 返回一组想吃 { items, count } */
    function generateOrder() {
      const pool = getOrderComboPool();
      if (!pool.length) return { items: ["fryRice"], count: 1, baseCount: 1 };
      // 统一归一化：mods 去重 + 排序，防止订单出现 soy+soy+wb
      // 闯关模式再做一次“强制合法性校验+重抽兜底”，杜绝未解锁内容漏出
      const isLevel = STATE.mode === "level";
      const cfg = isLevel ? getLevelConfig(STATE.currentLevelIndex || 1) : null;
      for (let tries = 0; tries < 30; tries++) {
        const pickedRaw = pickComboWeighted(pool, STATE.currentLevelIndex || 1) || pool[Math.floor(Math.random() * pool.length)];
        const items = normalizeGroupItems((pickedRaw || []).slice());
        if (!isLevel || !cfg || isComboAllowedInLevel(items, cfg)) {
          const count = wantCountForCombo(items);
          return { items, count, baseCount: count };
        }
      }
      // 兜底：用本关第一个可用 base（一定可做）
      if (isLevel && cfg) {
        const d = (cfg.unlockedDrinks || [])[0];
        const p = (cfg.unlockedDishes || [])[0];
        const c = (cfg.unlockedConveyor || [])[0];
        const safe = d ? [d] : (p ? [p] : (c ? [c] : ["fryRice"]));
        return { items: safe, count: 1, baseCount: 1 };
      }
      return { items: ["fryRice"], count: 1, baseCount: 1 };
    }

    function renderWants() {
      const mapRawToImg = (raw) => getStrictIconPngByRaw(raw);

      function renderOneGroup(group, index, isCurrent) {
        const wrap = document.createElement("div");
        wrap.className = "want-group-wrap";
        const comboDiv = document.createElement("div");
        comboDiv.style.display = "flex";
        comboDiv.style.alignItems = "center";
        comboDiv.style.gap = "2px";
        const items = normalizeItemsForDisplay(group && group.items ? group.items : (Array.isArray(group) ? group : []));
        const count = (group && typeof group.count === "number") ? group.count : 1;
        const isDrink = items.length && ["hu", "cha", "orange", "coke", "calpis"].includes(items[0]);
        if (items.length) {
          const nodes = [];
          items.forEach((i) => {
            const im = document.createElement("div");
            im.className = "want-img";
            let matched = mapRawToImg(i);
            if (matched && g_CroppedCanvas[matched]) im.appendChild(cloneCanvasSafe(matched));
            if (im.childNodes && im.childNodes.length) nodes.push(im);
          });
          nodes.forEach((node, idx) => {
            comboDiv.appendChild(node);
            if (nodes.length > 1 && idx < nodes.length - 1) {
              const plus = document.createElement("span");
              plus.innerText = "+";
              plus.className = "want-plus";
              comboDiv.appendChild(plus);
            }
          });
          wrap.appendChild(comboDiv);
          if (count > 1 && !isDrink) {
            const xN = document.createElement("span");
            xN.className = "want-xn";
            xN.innerText = "×" + count;
            wrap.appendChild(xN);
          }
        }
        return wrap;
      }

      const renderList = (listArr, containerId) => {
        const c = document.getElementById(containerId);
        c.innerHTML = "";
        const isCurrent = containerId === "want-current";
        if (isCurrent && listArr.length >= 2) {
          var left = listArr[0], right = listArr[1];
          var leftHalf = document.createElement("div");
          leftHalf.className = "want-current-half";
          var g0 = document.createElement("div");
          g0.className = "want-group" + (STATE.crossOutIndex === 0 ? " want-group-done" : "");
          g0.appendChild(renderOneGroup(left, 0, true));
          leftHalf.appendChild(g0);
          if ((STATE.mode === "speed" || STATE.mode === "level") && STATE.wantDeadlines && STATE.wantDeadlines[0] != null) {
            var t0 = document.createElement("div");
            t0.id = "want-timer-0";
            t0.className = "want-timer-bar";
            var maxSec0 = getTimedGroupLimit(WANT_TIMER_SPEED, left);
            var pct0 = maxSec0 > 0 ? Math.max(0, STATE.wantDeadlines[0]) / maxSec0 : 0;
            if (pct0 < 0.25) t0.classList.add("urgent");
            t0.innerHTML = "<div class=\"fill\" style=\"height:" + ((1 - pct0) * 100) + "%\"></div>";
            leftHalf.appendChild(t0);
          }
          c.appendChild(leftHalf);
          var div = document.createElement("div");
          div.className = "want-group-divider";
          c.appendChild(div);
          var rightHalf = document.createElement("div");
          rightHalf.className = "want-current-half";
          var g1 = document.createElement("div");
          g1.className = "want-group" + (STATE.crossOutIndex === 1 ? " want-group-done" : "");
          g1.appendChild(renderOneGroup(right, 1, true));
          rightHalf.appendChild(g1);
          if ((STATE.mode === "speed" || STATE.mode === "level") && STATE.wantDeadlines && STATE.wantDeadlines[1] != null) {
            var t1 = document.createElement("div");
            t1.id = "want-timer-1";
            t1.className = "want-timer-bar";
            var maxSec1 = getTimedGroupLimit(WANT_TIMER_SPEED, right);
            var pct1 = maxSec1 > 0 ? Math.max(0, STATE.wantDeadlines[1]) / maxSec1 : 0;
            if (pct1 < 0.25) t1.classList.add("urgent");
            t1.innerHTML = "<div class=\"fill\" style=\"height:" + ((1 - pct1) * 100) + "%\"></div>";
            rightHalf.appendChild(t1);
          }
          c.appendChild(rightHalf);
          return;
        }
        // 下一个只显示一组
        if (listArr.length > 0) {
          const comboDiv = renderOneGroup(listArr[0], 0, false);
          const row = document.createElement("div");
          row.className = "want-next-row";
          row.appendChild(comboDiv);
          c.appendChild(row);
        }
      };

      renderList(STATE.wantsCurrent, "want-current");
      renderList(STATE.wantsNext, "want-next");
    }

    function updateDrinksVisuals() {
      const blackCup = document.getElementById("zone-black-cup");
      blackCup.innerHTML = "";
      let bImg = "water_bei_empty.PNG";
      if (STATE.blackCupLevel > 0) bImg = STATE.blackCupType === "cha" ? "water_bei_cha.PNG" : "water_bei_hu.PNG";
      blackCup.appendChild(cloneCanvas(bImg));

      const glassCup = document.getElementById("zone-glass-cup");
      glassCup.innerHTML = "";
      let gImg = "water_glass_empty.PNG";
      if (STATE.glassCupLevel === 2) gImg = `water_glass_${STATE.glassCupType || "orange"}_full.PNG`;
      else if (STATE.glassCupLevel === 1) gImg = `water_glass_${STATE.glassCupType || "orange"}_half.PNG`;
      glassCup.appendChild(cloneCanvas(gImg));

      const cfg = STATE.mode === "level" ? getLevelConfig(STATE.currentLevelIndex || 1) : null;
      const unlockedDrinks = cfg && Array.isArray(cfg.unlockedDrinks) ? new Set(cfg.unlockedDrinks) : null;

      function renderDrinkSlot(id, type, imgName) {
        const slot = document.getElementById(id);
        if (!slot) return;
