        slot.classList.remove("locked");
        slot.innerHTML = "";
        if (STATE.mode === "level" && unlockedDrinks && !unlockedDrinks.has(type)) {
          slot.dataset.type = "";
          slot.classList.add("locked");
          return;
        }
        slot.dataset.type = type;
        slot.appendChild(cloneCanvasSafe(imgName));
      }

      // Update drag sources
      renderDrinkSlot("slot-hu", "hu", "water_hu.PNG");
      renderDrinkSlot("slot-cha", "cha", "water_cha.PNG");
      renderDrinkSlot("slot-orange", "orange", "water_orange.PNG");
      renderDrinkSlot("slot-coke", "coke", "water_coke.PNG");
      renderDrinkSlot("slot-calpis", "calpis", "water_calpis.PNG");
    }

    // 与 CONVEYOR_ORDER 一致，自助/闯关共用完整寿司种类
    const CONVEYOR_SUSHIS = CONVEYOR_ORDER.slice();

    /** 创建一格寿司盘，可选指定类型，不传则随机。仅用于传送带初始填充与松手还原 */
    function createOneConveyorItem(optionalType) {
      const el = document.createElement("div");
      el.className = "belt-item";
      const p = document.createElement("div");
      p.className = "plate";
      let plateColor = STATE.currentPlateSkin || "black";
      if (plateColor === "random") plateColor = getRandomUnlockedPlateColor();
      p.appendChild(cloneCanvas(getPlateImgNameByColor(plateColor)));
      const f = document.createElement("div");
      f.className = "food";
      let pool = CONVEYOR_SUSHIS;
      if (STATE.mode === "level") {
        const cfg = getLevelConfig(STATE.currentLevelIndex || 1);
        if (cfg && cfg.unlockedConveyor && cfg.unlockedConveyor.length) {
          pool = cfg.unlockedConveyor;
        }
      }
      if (!pool || !pool.length) pool = CONVEYOR_SUSHIS;
      const sType = optionalType && pool.includes(optionalType) ? optionalType : pool[Math.floor(Math.random() * pool.length)];

      if (sType === "tempera_mid" || sType === "tempera_left" || sType === "tempera_right") {
        f.classList.add("pc-3", "tempera-layout");
        ["sushi_tempera_left.PNG", "sushi_tempera_mid.PNG", "sushi_tempera_right.PNG"].forEach(function (name) {
          if (g_CroppedCanvas[name]) {
            const pc = document.createElement("div");
            pc.className = "pc";
            pc.appendChild(cloneCanvas(name));
            f.appendChild(pc);
          }
        });
      } else if (sType === "salmonLove") {
        f.classList.add("pc-1", "salmonLove-layout");
        const name = "sushi_salmonLove.PNG";
        if (g_CroppedCanvas[name]) {
          const pc = document.createElement("div");
          pc.className = "pc";
          pc.appendChild(cloneCanvas(name));
          f.appendChild(pc);
        }
      } else if (sType.indexOf("roll_") === 0 || sType.indexOf("california_") === 0) {
        f.classList.add("pc-4");
        if (sType.indexOf("roll_") === 0) f.classList.add("roll-layout");
        if (sType.indexOf("california_") === 0) f.classList.add("california-layout");
        const name = "sushi_" + sType + ".PNG";
        if (g_CroppedCanvas[name]) {
          for (let k = 0; k < 4; k++) {
            const pc = document.createElement("div");
            pc.className = "pc";
            pc.appendChild(cloneCanvas(name));
            f.appendChild(pc);
          }
        }
      } else {
        // 默认视为普通 2pc 寿司（norm 系）
        f.classList.add("pc-2", "norm2-layout");
        const name = "sushi_" + sType + ".PNG";
        if (g_CroppedCanvas[name]) {
          for (let k = 0; k < 2; k++) {
            const pc = document.createElement("div");
            pc.className = "pc";
            pc.appendChild(cloneCanvas(name));
            f.appendChild(pc);
          }
        }
      }

      el.appendChild(p);
      el.appendChild(f);
      el.dataset.type = sType;
      return el;
    }

    /** 2/3 不可见的大圈，保证每种都有；转一圈回来的空位在 gameLoop 里补 */
    function fillConveyorBelt() {
      const track = document.getElementById("conveyor-track");
      let baseTypes = CONVEYOR_SUSHIS;
      if (STATE.mode === "level") {
        const cfg = getLevelConfig(STATE.currentLevelIndex || 1);
        if (cfg && cfg.unlockedConveyor && cfg.unlockedConveyor.length) {
          baseTypes = cfg.unlockedConveyor;
        }
      }
      if (!baseTypes || !baseTypes.length) baseTypes = CONVEYOR_SUSHIS;
      const list = baseTypes.slice();
      for (let i = list.length; i < 15; i++) list.push(baseTypes[Math.floor(Math.random() * baseTypes.length)]);
      for (let i = list.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [list[i], list[j]] = [list[j], list[i]];
      }
      list.forEach(sType => track.appendChild(createOneConveyorItem(sType)));
    }

    // Tick loop
    let lastTime = 0;
    let conveyorOffset = 0;
    function gameLoop(time) {
      if (!STATE.playing || STATE.paused) {
        lastTime = time;
        return requestAnimationFrame(gameLoop);
      }
      // 刚刚开始游戏的第一帧，只记录时间基准，不扣时间，避免扣到“进页面之前”的时间
      if (!lastTime) {
        lastTime = time;
        return requestAnimationFrame(gameLoop);
      }
      const delta = (time - lastTime) / 1000;
      lastTime = time;

      // 新手引导：不扣时间（想吃没有时间限制）
      if (!(window.TUTORIAL && TUTORIAL.active)) {
        STATE.time -= delta;
      }

      if ((STATE.mode === "speed" || STATE.mode === "level") && STATE.wantDeadlines && STATE.wantDeadlines.length) {
        var needRender = false;
        for (let i = 0; i < STATE.wantDeadlines.length; i++) {
          STATE.wantDeadlines[i] -= delta;
          if (STATE.wantDeadlines[i] <= 0) {
            // 单侧时间到：先用「下一个」补位，再刷新「下一个」，不动另一侧，也不扣分
            var nextGroup;
            if (STATE.wantsNext && STATE.wantsNext.length > 0) {
              // 真正“消耗”下一个：从队列里 shift 掉
              var src = STATE.wantsNext.shift();
              var nextCount = src.count != null ? src.count : 1;
              nextGroup = {
                items: normalizeGroupItems((src.items || []).slice()),
                count: nextCount,
                baseCount: src.baseCount != null ? src.baseCount : nextCount
              };
            } else {
              nextGroup = generateOrder();
            }
            STATE.wantsCurrent[i] = nextGroup;
            if (!STATE.wantsNext || STATE.wantsNext.length === 0) STATE.wantsNext = [generateOrder()];
            STATE.wantDeadlines[i] = getTimedGroupLimit(WANT_TIMER_SPEED, STATE.wantsCurrent[i]);
            needRender = true;
          }
        }
        if (needRender) renderWants();
        if (typeof updateSpeedModeTimerBars === "function") updateSpeedModeTimerBars();
      }

      if (isFriendsActive() && STATE.friendsDeadlines) {
        const FRIEND_PENALTY = 8;
        const FRIEND_TIMER = 20;
        const FRIEND_COOLDOWN_SEC = 2;
        var cooldown = STATE.friendsCooldown || [];
        var n = cooldown.length;
        for (var i = 0; i < n; i++) {
          if (cooldown[i] > 0) {
            cooldown[i] -= delta;
            if (cooldown[i] <= 0 && (STATE.friendsWants[i] == null || !STATE.friendsWants[i])) {
              STATE.friendsWants[i] = generateOrder();
              STATE.friendsDeadlines[i] = FRIEND_TIMER;
            }
          } else {
            STATE.friendsDeadlines[i] -= delta;
            if (STATE.friendsDeadlines[i] <= 0) {
              STATE.score -= FRIEND_PENALTY;
              // 扣分飘字：在对应饭友气泡附近显示 -X 分
              showFriendPenalty(i, FRIEND_PENALTY);
              // 扣分场景：不进入“吃吃吃中”，直接立刻刷新成新的想吃
              STATE.friendsWants[i] = generateOrder();
              STATE.friendsDeadlines[i] = FRIEND_TIMER;
              cooldown[i] = 0;
            }
          }
        }
        STATE.friendsCooldown = cooldown;
        renderFriendsBubbles();
        renderWants();
        updateTopInfo();
        // 分数被扣到 0 以下：提前结束本局（0 分还能继续扛一会儿）
        if (STATE.score < 0) {
          STATE.playing = false;
          STATE.time = 0;
          updateTopInfo();
          if (STATE.mode === "friends") {
            requestAnimationFrame(function () { showFriendsGameOver(); });
          } else if (STATE.mode === "level") {
            requestAnimationFrame(function () { showLevelFailModal(); });
          }
          return requestAnimationFrame(gameLoop);
        }
      }

      if (STATE.time <= 0) {
        STATE.time = 0;
        STATE.playing = false;
        updateTopInfo();
        if (isFriendsActive()) {
          renderFriendsBubbles();
          renderWants();
        }
        requestAnimationFrame(function showTimeUpModal() {
          if (STATE.mode === "buffet") {
            showCustomModal(
              t("时间到！<br>你吃了 " + STATE.money.toFixed(2) + " 块钱！<br>太厉害了！",
                "Time's up!<br>You have eaten ¥" + STATE.money.toFixed(2) + ".<br>Amazing!"),
              [
                { text: t("再玩一次", "Play Again"), primary: true, cb: function () { STATE.playing = false; STATE.paused = false; if (typeof resetHolding === "function") resetHolding(); startGame("buffet"); } },
                { text: t("返回标题", "Back to Title"), fullWidth: true, cb: goToTitle }
            ]);
          } else if (STATE.mode === "level") {
            handleLevelFinish();
          } else if (STATE.mode === "speed") {
            addRunStarsToTotal(STATE.score);
            showCustomModal(
              t("时间到！<br>本局评价：" + getRunStars(STATE.score) + "<br>分数 " + STATE.score + " 分",
                "Time's up!<br>Rating: " + getRunStars(STATE.score) + "<br>Score " + STATE.score),
              [
                { text: t("再玩一次", "Play Again"), primary: true, cb: function () { STATE.playing = false; if (typeof resetHolding === "function") resetHolding(); startGame("speed"); } },
                { text: t("返回标题", "Back to Title"), fullWidth: true, cb: goToTitle }
            ]);
          } else if (STATE.mode === "friends") {
            addRunStarsToTotal(STATE.score);
            showCustomModal(
              t("时间到！<br>本局评价：" + getRunStars(STATE.score) + "<br>分数 " + STATE.score + " 分",
                "Time's up!<br>Rating: " + getRunStars(STATE.score) + "<br>Score " + STATE.score),
              [
                { text: t("再玩一次", "Play Again"), primary: true, cb: function () { STATE.playing = false; if (typeof resetHolding === "function") resetHolding(); startGame("friends"); } },
                { text: t("返回标题", "Back to Title"), fullWidth: true, cb: goToTitle }
            ]);
          }
        });
        return;
      }

      if (Math.floor(STATE.time) % 1 === 0) updateTopInfo();

      // Conveyor move：左移，最左一格移到最后，避免整条闪现；空位转回来时补新
      conveyorOffset += 28 * delta; // px per sec
      const step = 102; // 与 .belt-item width+margin 一致(90+12=102)
      const track = document.getElementById("conveyor-track");
      if (conveyorOffset >= step) {
        conveyorOffset -= step;
        if (track.firstChild) track.appendChild(track.firstChild);
        if (track.lastChild && track.lastChild.dataset.type === "placeholder") {
          const newEl = createOneConveyorItem();
          track.replaceChild(newEl, track.lastChild);
        }
      }
      track.style.transform = `translateX(${-conveyorOffset}px)`;

      requestAnimationFrame(gameLoop);
    }

    const MONEY_BAR_MAX = 200; // 金钱进度条满格对应的金额，可改
    const SCORE_BAR_MAX = 100; // 闯关分数条满格
    function showFriendPenalty(index, penalty) {
      var bubbleIds = ["friend-bubble-left", "friend-bubble-right", "friend-bubble-3", "friend-bubble-4"];
      var id = bubbleIds[index];
      var bubble = id && document.getElementById(id);
      if (!bubble) return;
      var rect = bubble.getBoundingClientRect();
      var el = document.createElement("div");
      el.innerText = "-" + penalty + " 分";
      el.style.position = "fixed";
      el.style.left = (rect.left + rect.width / 2 - 24) + "px";
      el.style.top = (rect.top - 10) + "px";
      el.style.color = "#e6473b";
      el.style.fontWeight = "bold";
      el.style.fontSize = "0.9rem";
      el.style.pointerEvents = "none";
      el.style.zIndex = "99999";
      el.style.transition = "top 0.8s, opacity 0.8s";
      document.body.appendChild(el);
      setTimeout(() => { el.style.top = (rect.top - 40) + "px"; el.style.opacity = 0; }, 30);
      setTimeout(() => { if (el.parentNode) el.remove(); }, 900);
    }
    function getRunStars(score) {
      if (score >= 90) return "★★★";
      if (score >= 60) return "★★☆";
      if (score >= 30) return "★☆☆";
      return "☆☆☆";
    }
    function addRunStarsToTotal(score) {
      // 根据分数给总星星加 0~3 颗（只加不减）
      let gain = 0;
      if (score >= 90) gain = 3;
      else if (score >= 60) gain = 2;
      else if (score >= 30) gain = 1;
      if (gain > 0) {
        STATE.stars += gain;
        updateStarDisplay();
        saveProgressToStorage();
      }
    }
    function showFriendsGameOver() {
      showCustomModal("你的朋友抢走了所有的食物！<br>积分 " + STATE.score, [
        { text: "再玩一次", primary: true, cb: () => { STATE.playing = false; if (typeof resetHolding === "function") resetHolding(); startGame("friends"); } },
        { text: "返回标题", fullWidth: true, cb: goToTitle }
      ]);
    }

    function updateTopInfo() {
      const bar = document.getElementById("money-bar-fill");
      const textEl = document.getElementById("money-text");
      if (STATE.mode === "buffet") {
        if (bar) bar.style.width = Math.min((STATE.money / MONEY_BAR_MAX) * 100, 100) + "%";
        if (textEl) textEl.innerText = "¥ " + STATE.money.toFixed(2);
      } else if (STATE.mode === "speed" || STATE.mode === "friends") {
        const pct = Math.min(100, Math.max(0, (STATE.score / 100) * 100));
        if (bar) bar.style.width = pct + "%";
        if (textEl) textEl.innerText = t("分数 ", "Score ") + STATE.score;
      } else {
        const idx = STATE.currentLevelIndex || 1;
        const cfg = getLevelConfig(idx);
        const target = cfg && cfg.targetScore ? cfg.targetScore : SCORE_BAR_MAX;
        const pct = target > 0 ? Math.min(100, (STATE.score / target) * 100) : 0;
        if (bar) bar.style.width = pct + "%";
        if (textEl) textEl.innerText = t("分数 ", "Score ") + STATE.score;
      }
      const m = Math.floor(STATE.time / 60); const s = Math.floor(STATE.time % 60);
      const timerEl = document.getElementById("timer");
      if (timerEl) {
        timerEl.innerText = m + ":" + s.toString().padStart(2, "0");
        if (STATE.time <= 10 && STATE.time > 0) timerEl.classList.add("timer-warning");
        else timerEl.classList.remove("timer-warning");
      }
    }

    // ---- INTERACTION : 筷子跟随指针，点击夹取/点击拖拽饮料·杯子·回转盘 ----
    let dragPos = { x: -1000, y: -1000 };
    let isDown = false;
    let currentHolding = null;
    let draggedBeltEl = null; // 拖拽中的回转盘 DOM，放下时从传送带移除

    const wrap = document.getElementById("chopsticks-wrap");

    // 筷子：空手/夹食物=筷子尖跟鼠标；拿整盘/饮料/杯子(筷子隐藏)=整体居中鼠标
    function updateWrapPosition(x, y) {
      dragPos.x = x; dragPos.y = y;
      if (wrap.classList.contains("holding-plate") || wrap.classList.contains("holding-drink")) {
        // 拿整盘/杯子时：整体居中到鼠标
        wrap.style.left = (x - 80) + "px";
        wrap.style.top = (y - 80) + "px";
      } else {
        // 正常夹筷子时：容器顶点在鼠标上方一点点，让筷尖基本落在鼠标附近
        // 想让筷子更靠近鼠标：把 150 改小一点；想让筷子更远离鼠标：把 150 改大一点
        const OFFSET_Y = 120;
        wrap.style.left = x + "px";
        wrap.style.top = (y - OFFSET_Y) + "px";
      }
    }

    // 交互：拖动=移动筷子；轻点/点击=夹取/切换拿起；放下=轻点/点击放置
    let downX = 0, downY = 0;
    let movedSinceDown = false;
    const TAP_MOVE_THRESHOLD = 10; // 移动超过该像素认为是“拖动”，不触发夹取

    window.addEventListener("pointerdown", e => {
      const x = e.clientX, y = e.clientY;
      // 让新手引导先决定是否拦截本次点击
      if (window.TUTORIAL && typeof TUTORIAL.onPointerDown === "function") {
        const consumed = TUTORIAL.onPointerDown(x, y, e);
        if (consumed) return;
      }
      if (!STATE.playing || STATE.paused) {
        // 教程模式下允许移动筷子/触发交互
        if (!(window.TUTORIAL && TUTORIAL.active)) return;
      }
      // 不管在菜单还是游戏里，每次点击都先把筷子挪到点击附近，防止筷子“丢到别处”
      updateWrapPosition(x, y);
      e.preventDefault();
      isDown = true;
      movedSinceDown = false;
      downX = x; downY = y;
      wrap.classList.add("grabbing");
    }, { passive: false });

    window.addEventListener("pointermove", e => {
      const x = e.clientX, y = e.clientY;
      if (!STATE.playing || STATE.paused) {
        if (!(window.TUTORIAL && TUTORIAL.active)) return;
      }
      if (!isDown) wrap.style.transition = "transform 0.05s linear, left 0.1s linear, top 0.1s linear";
      else wrap.style.transition = "none";
      updateWrapPosition(x, y);
      if (isDown) {
        const dx = x - downX, dy = y - downY;
        if ((dx * dx + dy * dy) >= (TAP_MOVE_THRESHOLD * TAP_MOVE_THRESHOLD)) movedSinceDown = true;
      }
    });

    window.addEventListener("pointerup", e => {
      const x = e.clientX, y = e.clientY;
      if (!STATE.playing || STATE.paused) {
        if (!(window.TUTORIAL && TUTORIAL.active)) return;
      }
      updateWrapPosition(x, y);
      isDown = false;
      wrap.classList.remove("grabbing");
      // 新手引导：每一步必须在“圆框内”抬手才允许触发生效（抓取/放下）
      if (window.TUTORIAL && TUTORIAL.active && typeof TUTORIAL.isInsideHot === "function") {
        const inside = TUTORIAL.isInsideHot(x, y);
        if (!inside) {
          try { e.preventDefault(); e.stopPropagation(); } catch (e2) { }
          return;
        }
      }
      if (currentHolding) {
        tryDropItem(); // 点击放置/吃/倒
      } else if (!movedSinceDown) {
        tryGrabItem(x, y); // 轻点/点击才夹取或切换拿起
      }
    });

    window.addEventListener("pointercancel", (e) => {
      if (!STATE.playing || STATE.paused) {
        if (!(window.TUTORIAL && TUTORIAL.active)) return;
      }
      isDown = false;
      wrap.classList.remove("grabbing");
      if (currentHolding) tryDropItem();
    });

    function elementContains(el, x, y) {
      const rect = el.getBoundingClientRect();
      return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
    }

    /** 命中按点击处真实层级：elementsFromPoint，用 closest 保证点到子元素也能识别盘子等 */
    function tryGrabItem(px, py) {
      if (currentHolding) return;
      const x = px ?? dragPos.x, y = py ?? dragPos.y;
      let list = [];
      try { list = document.elementsFromPoint(x, y); } catch (e) { list = []; }
      for (const el of list) {
        const dish = el.closest && el.closest(".dish-item");
        if (dish && dish.dataset.raw) {
          // 未解锁（虚线/locked）不可拿取
          if (dish.classList.contains("locked")) continue;
          if (window.TUTORIAL && TUTORIAL.active && !TUTORIAL.canGrabDish(dish.dataset.raw)) continue;
          // 盘装拿起：原位留影子
          dish.classList.add("ghost");
          grab(dish.dataset.raw, "dish", null, [], { kind: "dish-item", id: dish.dataset.raw });
          return;
        }
        const belt = el.closest && el.closest(".belt-item");
        // 只能在传送带上的盘子允许“整盘拿起”：桌上的整盘(克隆的 belt-item) 禁止整盘拿，只能夹上面的寿司
        if (
          belt &&
          !belt.classList.contains("belt-item-ghost") &&
          !belt.classList.contains("desk-belt-item") &&
          belt.dataset.type &&
          belt.dataset.type !== "empty Plate" &&
          belt.dataset.type !== "placeholder"
        ) {
          if (window.TUTORIAL && TUTORIAL.active && !TUTORIAL.canGrabConveyorPlate(belt.dataset.type)) continue;
          grabConveyorPlate(belt);
          return;
        }
        const slot = el.closest && el.closest(".desk-slot.has-item");
        if (slot && slot.dataset.type) {
          if (window.TUTORIAL && TUTORIAL.active && !TUTORIAL.canGrabFromTable(slot)) continue;
          reduceSlotAndGrabOne(slot);
          return;
        }
        const drink = el.closest && el.closest(".drink-slot");
        if (drink && drink.dataset.type) {
          // 未解锁（虚线/locked）不可拿取
          if (drink.classList.contains("locked")) continue;
          if (window.TUTORIAL && TUTORIAL.active && !TUTORIAL.canGrabDrinkBottle(drink.dataset.type)) continue;
          grab(drink.dataset.type, "drink-bottle", null, [], { kind: "drink-slot", id: drink.id });
          return;
        }
        const cup = el.closest && el.closest(".cup-zone");
        if (cup && cup.innerHTML !== "") {
          if (window.TUTORIAL && TUTORIAL.active && !TUTORIAL.canGrabCup(cup.id)) continue;
          if (cup.id === "zone-black-cup" && STATE.blackCupLevel > 0) { grab("blackCup", "cup", null, [], { kind: "cup-zone", id: cup.id }); return; }
          if (cup.id === "zone-glass-cup" && STATE.glassCupLevel > 0) { grab("glassCup", "cup", null, [], { kind: "cup-zone", id: cup.id }); return; }
        }
      }
    }

    function grabConveyorPlate(beltEl) {
      const sType = beltEl.dataset.type;
      currentHolding = { raw: sType, src: "conveyor-plate", mods: [] };
      draggedBeltEl = beltEl;
      document.getElementById("chop-back").classList.add("hidden");
      document.getElementById("chop-front").classList.add("hidden");
      document.getElementById("chopsticks-wrap").classList.add("holding-plate");
      const cf = document.getElementById("chop-food");
      cf.innerHTML = "";
      const same = createOneConveyorItem(sType);
      const plateView = document.createElement("div");
      plateView.className = "plate-view";
      if (same.querySelector(".plate")) plateView.appendChild(same.querySelector(".plate"));
      if (same.querySelector(".food")) plateView.appendChild(same.querySelector(".food"));
      cf.appendChild(plateView);
      beltEl.classList.add("belt-item-ghost");
      updateWrapPosition(dragPos.x, dragPos.y);
      // 教程中：拿起任意回转盘即进入“放到桌上”步骤
      if (window.TUTORIAL && TUTORIAL.active && typeof TUTORIAL.onGrabPlate === "function") {
        TUTORIAL.onGrabPlate(sType);
      }
    }

    function reduceSlotAndGrabOne(slotEl) {
      const type = slotEl.dataset.type;
      const mods = slotEl.dataset.mods ? JSON.parse(slotEl.dataset.mods) : [];
      const foodWrap = slotEl.querySelector(".food");
      const pcs = foodWrap ? foodWrap.querySelectorAll(".pc") : [];
      const origin = { kind: "table-slot", slotIndex: slotEl.dataset.index, wasLastPiece: (pcs.length <= 1) };
      if (pcs.length > 1) {
        pcs[pcs.length - 1].remove();
        slotEl.dataset.type = type;
        slotEl.dataset.mods = JSON.stringify(mods);
        slotEl.dataset.emptyPlate = "";
      } else {
        // 最后一块被夹起时：保留盘子占位（可放回），真正吃掉后再清空释放
        const fw = slotEl.querySelector(".food");
        if (fw) fw.remove();
        slotEl.dataset.emptyPlate = "1";
      }
      grab(type, "table", null, mods, origin);
    }

    function clearTableSlot(slotEl) {
      if (!slotEl) return;
      slotEl.innerHTML = "";
      slotEl.classList.remove("has-item");
      slotEl.dataset.type = "";
      slotEl.dataset.mods = "";
      slotEl.dataset.emptyPlate = "";
    }

    function getSushiPlateSpec(t) {
      // salmonLove：花之恋，1pc，使用 salmonLove 布局
      if (t === "salmonLove" || (t && t.includes && t.includes("Love"))) {
        return { pcClass: "pc-1 salmonLove-layout", max: 1, imgs: ["sushi_salmonLove.PNG"] };
      }
      // tempera：天妇罗三块，使用 tempera 布局
      if (t && t.includes && t.includes("tempera")) {
        return { pcClass: "pc-3 tempera-layout", max: 3, imgs: ["sushi_tempera_left.PNG", "sushi_tempera_mid.PNG", "sushi_tempera_right.PNG"] };
      }
      // roll_*：手卷四块，使用 roll 布局
      if (t && t.indexOf && t.indexOf("roll_") === 0) {
        return { pcClass: "pc-4 roll-layout", max: 4, imgs: [`sushi_${t}.PNG`] };
      }
      // california_*：加州卷四块，使用 california 布局
      if (t && t.indexOf && t.indexOf("california_") === 0) {
        return { pcClass: "pc-4 california-layout", max: 4, imgs: [`sushi_${t}.PNG`] };
      }
      // 其他 norm_*：2pc 普通寿司，使用 norm2 布局
      return { pcClass: "pc-2 norm2-layout", max: 2, imgs: [`sushi_${t}.PNG`] };
    }

    function ensureFoodDivForSlot(slotEl, t) {
      let food = slotEl.querySelector(".food");
      if (!food) {
        food = document.createElement("div");
        food.className = "food";
        slotEl.appendChild(food);
      }
      const spec = getSushiPlateSpec(t);
      food.className = "food " + spec.pcClass;
      return food;
    }

    function addOneSushiPcToSlot(slotEl, t) {
      if (!slotEl) return false;
      const spec = getSushiPlateSpec(t);
      const food = ensureFoodDivForSlot(slotEl, t);
      const pcs = food.querySelectorAll(".pc");
      if (pcs.length >= spec.max) return false;
      let imgName = spec.imgs[0];
      if (spec.pcClass === "pc-3") imgName = spec.imgs[pcs.length] || spec.imgs[spec.imgs.length - 1];
      const pc = document.createElement("div");
      pc.className = "pc";
      const c = cloneCanvas(imgName);
      if (c) pc.appendChild(c);
      food.appendChild(pc);
      slotEl.dataset.emptyPlate = "";
      return true;
    }

    /** 盘装原料对应的 get_ 图文件名（与 img 里命名一致：salmon_belly->salmonBelly） */
    function getDishImageName(rawId, modStr) {
      if (/seaweed/.test(modStr) && ["salmonSlice", "salmonCube", "salmon_noodle", "salmon_belly"].includes(rawId))
        return "get_seaweed.PNG";
      const base = { salmon_belly: "salmonBelly", salmon_noodle: "salmonNoodle" }[rawId] || rawId;
      return `get_${base}${modStr}.PNG`;
    }
    /** 寿司夹起图：salmonLove->get_sushi_salmonLover，天妇罗->get_sushi_tempera；仅 shirmp/tuna/salmon 可加海苔用 get_seaweed.PNG */
    function getSushiImageName(rawId, modStr) {
      if (/seaweed/.test(modStr) && ["norm_shirmp", "norm_tuna", "norm_salmon"].includes(rawId))
        return "get_seaweed.PNG";
      const base = rawId === "salmonLove"
        ? "salmonLover"
        : (rawId === "tempera_mid" ? "tempera" : rawId);
      return `get_sushi_${base}${modStr}.PNG`;
    }

    function grab(rawId, srcType, explicitImg, mods, origin) {
      // 统一归一化：去重 + 排序，防止任何路径出现 soy+soy+wb
      const seen = new Set();
      const uniq = [];
      (mods || []).forEach(m => {
        if (!m) return;
        if (seen.has(m)) return;
        seen.add(m);
        uniq.push(m);
      });
      const normalizedMods = uniq.sort((a, b) => MOD_ORDER.indexOf(a) - MOD_ORDER.indexOf(b));
      currentHolding = { raw: rawId, src: srcType, mods: normalizedMods };
      if (origin) currentHolding.origin = origin;
      const cf = document.getElementById("chop-food");
      cf.innerHTML = "";

      if (srcType === "drink-bottle") {
        // 原位留影子
        try {
          if (currentHolding.origin && currentHolding.origin.kind === "drink-slot" && currentHolding.origin.id) {
            const el = document.getElementById(currentHolding.origin.id);
            if (el) el.classList.add("ghost");
          }
        } catch (e) { }
        document.getElementById("chopsticks-wrap").classList.add("holding-drink");
        document.getElementById("chop-back").classList.add("hidden"); document.getElementById("chop-front").classList.add("hidden");
        const srcName = `water_${rawId}.PNG`;
        const cvs = cloneCanvas(srcName);
        if (cvs) cf.appendChild(wrapAsHoldItem(cvs, srcName, 0.08, 1.55, "center"));
        // 立刻居中鼠标（不等下一次 mousemove）
        updateWrapPosition(dragPos.x, dragPos.y);
        return;
      }
      if (srcType === "cup") {
        // 原位留虚线占位
        try {
          if (currentHolding.origin && currentHolding.origin.kind === "cup-zone" && currentHolding.origin.id) {
            const el = document.getElementById(currentHolding.origin.id);
            if (el) el.classList.add("placeholder");
          }
        } catch (e) { }
        // 杯子也属于“居中鼠标”的拿取（筷子隐藏）
        document.getElementById("chopsticks-wrap").classList.add("holding-drink");
        document.getElementById("chop-back").classList.add("hidden"); document.getElementById("chop-front").classList.add("hidden");
        const blackImg = rawId === "blackCup" ? (STATE.blackCupType === "cha" ? "water_bei_cha.PNG" : "water_bei_hu.PNG") : null;
        const srcName = rawId === "blackCup"
          ? blackImg
          : `water_glass_${STATE.glassCupType || "orange"}_${STATE.glassCupLevel >= 2 ? "full" : "half"}.PNG`;
        const cvs = cloneCanvas(srcName);
        if (cvs) cf.appendChild(wrapAsHoldItem(cvs, srcName, 0.08, 1.85, "center"));
        // 立刻居中鼠标（不等下一次 mousemove）
        updateWrapPosition(dragPos.x, dragPos.y);
        return;
      }

      // Normal chopsticks item
      document.getElementById("chop-back").classList.remove("hidden"); document.getElementById("chop-front").classList.remove("hidden");

      const modStr = mods.length > 0 ? "+" + mods.join("+") : "";
      const hasSeaweed = mods && mods.includes("seaweed");
      const modsNoSeaweed = hasSeaweed ? mods.filter(m => m !== "seaweed") : mods;
      const modStrNoSeaweed = modsNoSeaweed.length > 0 ? "+" + modsNoSeaweed.join("+") : "";

      let targetImgStr = "";
      if (srcType === "dish") targetImgStr = getDishImageName(rawId, modStr);
      if (srcType === "conveyor" || srcType === "table") targetImgStr = getSushiImageName(rawId, modStr);

      let foodOnlyStr = "";
      if (srcType === "dish") foodOnlyStr = getDishImageName(rawId, modStrNoSeaweed);
      if (srcType === "conveyor" || srcType === "table") foodOnlyStr = getSushiImageName(rawId, modStrNoSeaweed);

      let cvs = null;
      let usedName = "";
      if (g_CroppedCanvas[targetImgStr]) { cvs = cloneCanvas(targetImgStr); usedName = targetImgStr; }
      if (!cvs && explicitImg) { cvs = cloneCanvas(explicitImg); usedName = explicitImg; }
      if (!cvs && currentHolding.raw) {
        const dishFallbacks = [
          getDishImageName(currentHolding.raw, ""),
          "get_" + (currentHolding.raw === "salmon_belly" ? "salmonBelly" : currentHolding.raw === "salmon_noodle" ? "salmonNoodle" : currentHolding.raw) + ".PNG",
          `sushi_${currentHolding.raw}.PNG`
        ];
        const sushiFallbacks = [
          getSushiImageName(currentHolding.raw, ""),
          (currentHolding.raw === "salmonLove" ? "get_sushi_salmonLover.PNG" : `get_sushi_${currentHolding.raw}.PNG`),
          `sushi_${currentHolding.raw}.PNG`
        ];
        const fallbacks = srcType === "dish" ? dishFallbacks : sushiFallbacks;
        for (const fb of fallbacks) { if (g_CroppedCanvas[fb]) { cvs = cloneCanvas(fb); usedName = fb; break; } }
      }

      if (hasSeaweed && g_CroppedCanvas["get_seaweed.PNG"] && foodOnlyStr && g_CroppedCanvas[foodOnlyStr]) {
        var seaweedWrap = wrapAsHoldItem(cloneCanvas("get_seaweed.PNG"), "get_seaweed.PNG", 0.08, 1.48, "grab");
        seaweedWrap.classList.add("hold-item-seaweed");
        var foodWrap = wrapAsHoldItem(cloneCanvas(foodOnlyStr), foodOnlyStr, 0.08, 1.48, "grab");
        foodWrap.classList.add("hold-item-food");
        cf.appendChild(seaweedWrap);
        cf.appendChild(foodWrap);
      } else if (cvs) {
        cf.appendChild(wrapAsHoldItem(cvs, usedName || targetImgStr || explicitImg || "", 0.08, 1.48, "grab"));
      }
    }

    function tryDropItem() {
      if (!currentHolding) return;

      const cf = document.getElementById("chop-food");

      // 0. 饭友模式：拖到饭友气泡上即投喂。
      //    可以直接递食物（盘子/寿司）或「茶壶 / 可乐罐」本体（drink-bottle），杯子始终属于玩家自己。
      if (isFriendsActive() && STATE.friendsWants &&
          (currentHolding.src === "conveyor" || currentHolding.src === "conveyor-plate" || currentHolding.src === "table" || currentHolding.src === "dish" || currentHolding.src === "drink-bottle")) {
        var bubbleIds = ["friend-bubble-left", "friend-bubble-right", "friend-bubble-3", "friend-bubble-4"];
        var cooldown = STATE.friendsCooldown || [];
        var n = Math.min(getActiveFriendsCount() || 2, 4);
        for (var fb = 0; fb < n; fb++) {
          var bubble = document.getElementById(bubbleIds[fb]);
          if (!bubble || cooldown[fb] > 0) continue;
          var w = STATE.friendsWants[fb];
          if (!w || !w.items) continue;
          var rect = bubble.getBoundingClientRect();
          if (dragPos.x >= rect.left && dragPos.x <= rect.right && dragPos.y >= rect.top && dragPos.y <= rect.bottom) {
            var fakeCurrent = [w];
            var oldCurrent = STATE.wantsCurrent;
            STATE.wantsCurrent = fakeCurrent;
            var idx = getMatchingWantGroupIndex(currentHolding);
            STATE.wantsCurrent = oldCurrent;
            if (idx === 0) {
              var prevCountF = (w && typeof w.count === "number") ? w.count : 1;
              var newCountF = Math.max(0, prevCountF - 1);
              var baseCountF = w && (w.baseCount != null ? w.baseCount : prevCountF);
              STATE.friendsWants[fb] = newCountF > 0 ? { items: normalizeGroupItems(w.items || []).slice(), count: newCountF, baseCount: baseCountF } : null;
              var consumedFriend = (newCountF === 0);
              var sBase = getLevelBaseScore(currentHolding.raw);
              var sExtra = getLevelModsScore(currentHolding.mods || []);
              var sGain = sBase + sExtra;
              var friendMul = getCountMultiplier(baseCountF || newCountF || 1);
              var finalFriendGain = sGain * friendMul;
              STATE.score += finalFriendGain;
              createFloatingScore("+" + finalFriendGain + " 分");
              // 成功投喂：
              // - 未吃完（x2/x3）：立刻继续同一单，不进入“吃吃吃中”
              // - 吃完（单个/扣到0）：进入“吃吃吃中”并在冷却后刷新新单
              if (!STATE.friendsCooldown) STATE.friendsCooldown = [];
              if (consumedFriend) {
                STATE.friendsWants[fb] = null;
                STATE.friendsCooldown[fb] = 2;
                STATE.friendsDeadlines[fb] = 0;
                // 隐藏该气泡计时条
                var timerIds = ["friend-timer-left", "friend-timer-right", "friend-timer-3", "friend-timer-4"];
                var tEl = document.getElementById(timerIds[fb]);
                if (tEl) { tEl.style.display = "none"; tEl.innerHTML = ""; }
              }
              if (typeof updateTopInfo === "function") updateTopInfo();
              // 立即渲染一次，避免“单个加分了但 UI 没进入吃吃吃中/没刷新”的偶发
              renderFriendsBubbles();
              renderWants();
              // 下一帧再渲染一次，防止同帧其他逻辑覆盖（requestAnimationFrame 更稳定）
              requestAnimationFrame(function () {
                if (isFriendsActive()) {
                  renderFriendsBubbles();
                  renderWants();
                }
              });
              // 如果是桌上寿司最后一块被喂给饭友：吃掉后释放该盘位（空盘自动消失）
              if (currentHolding.src === "table" && currentHolding.origin && currentHolding.origin.kind === "table-slot" && currentHolding.origin.wasLastPiece) {
                const originSlot = document.querySelector(`.desk-slot[data-index="${currentHolding.origin.slotIndex}"]`);
                clearTableSlot(originSlot);
              }
              if (currentHolding.src === "conveyor-plate" && draggedBeltEl) {
                draggedBeltEl.innerHTML = "";
                var ovalEl = document.createElement("div");
                ovalEl.className = "belt-item-empty";
                draggedBeltEl.appendChild(ovalEl);
                draggedBeltEl.dataset.type = "placeholder";
              }
              resetHolding();
              return;
            }
          }
        }
      }

      // 1. Check Eat Zone（自己吃：仅当落点在吃饭区矩形内才触发，不与别区重合）
      const eatZoneEl = document.getElementById("eat-zone");
      if (eatZoneEl && elementContains(eatZoneEl, dragPos.x, dragPos.y)) {
        if (window.TUTORIAL && TUTORIAL.active && !TUTORIAL.canDropToEatZone(currentHolding)) {
          return; // 点错：无事发生，继续拿着
        }
        if (currentHolding.src === "drink-bottle") {
          // 饮料不能放进吃掉区当饭吃
          resetHolding();
          return;
        }
        if (currentHolding.src === "cup") {
          // 只能喝杯子：茶水/白开水一次喝完，透明杯一次喝半杯、第二次喝完；喝的内容匹配「想吃」里的水(瓶)需求
          const drinkContent = currentHolding.raw === "blackCup" ? STATE.blackCupType : (currentHolding.raw === "glassCup" ? STATE.glassCupType : null);
          if (currentHolding.raw === "blackCup") { STATE.blackCupLevel = 0; STATE.blackCupType = null; }
          if (currentHolding.raw === "glassCup") STATE.glassCupLevel = Math.max(0, STATE.glassCupLevel - 1);
          updateDrinksVisuals();
          if (drinkContent) {
            const virtualHolding = { raw: drinkContent, mods: [] };
            const matchedGroupIndex = getMatchingWantGroupIndex(virtualHolding);
            if (matchedGroupIndex >= 0) {
            var gDrink = STATE.wantsCurrent[matchedGroupIndex];
              if (gDrink && gDrink.items) {
                var prevCountDrink = typeof gDrink.count === "number" ? gDrink.count : 1;
                var newCountDrink = Math.max(0, prevCountDrink - 1);
                var baseCountDrink = gDrink.baseCount != null ? gDrink.baseCount : prevCountDrink;
                STATE.wantsCurrent[matchedGroupIndex] = { items: normalizeGroupItems(gDrink.items || []).slice(), count: newCountDrink, baseCount: baseCountDrink };
                var consumedDrink = (newCountDrink === 0);
              if (STATE.mode === "buffet") {
                  var moneyGain = getBasePrice(drinkContent);
                STATE.money += moneyGain;
                createFloatingScore("+ ¥" + moneyGain.toFixed(0));
              } else {
                  var sGain = getLevelBaseScore(drinkContent);
                  var drinkMul = getCountMultiplier(baseCountDrink);
                  var finalDrinkScore = sGain * drinkMul;
                STATE.score += finalDrinkScore;
                createFloatingScore("+" + finalDrinkScore.toFixed(0) + " 分");
              }
                if (consumedDrink) fulfillOneGroup(matchedGroupIndex);
              else renderWants();
              if (typeof updateTopInfo === "function") updateTopInfo();
              }
            }
          }
          resetHolding();
          if (window.TUTORIAL && TUTORIAL.active) TUTORIAL.onDrinkCompleted(drinkContent);
          return;
        }
        // 只有“筷子夹着的食物”可以直接吃：盘装原料 / 桌上单颗寿司 / 传送带寿司（整盘不允许）
        const isFood = (currentHolding.src === "conveyor" || currentHolding.src === "conveyor-plate" || currentHolding.src === "table" || currentHolding.src === "dish");
        if (!isFood) return; // 无效果且不消失
        if (isFood) {
          var matchedGroupIndex = getMatchingWantGroupIndex(currentHolding);
          if (matchedGroupIndex >= 0) {
            var g = STATE.wantsCurrent[matchedGroupIndex];
            if (!g || !g.items) { resetHolding(); return; }
            var prevCount = typeof g.count === "number" ? g.count : 1;
            var newCount = Math.max(0, prevCount - 1);
            var baseCount = g.baseCount != null ? g.baseCount : prevCount;
            STATE.wantsCurrent[matchedGroupIndex] = { items: normalizeGroupItems(g.items || []).slice(), count: newCount, baseCount: baseCount };
            var consumed = (newCount === 0);
            if (STATE.mode === "buffet") {
              // 自助：加钱
              const base = getBasePrice(currentHolding.raw);
              const extra = getModsExtraPrice(currentHolding.mods || []);
              const moneyGain = base + extra;
              STATE.money += moneyGain;
              createFloatingScore("+ ¥" + moneyGain.toFixed(0));
            } else {
              // 闯关 / 快吃吧你 / 饥饿饭友：加分
              const sBase = getLevelBaseScore(currentHolding.raw);
              const sExtra = getLevelModsScore(currentHolding.mods || []);
              const sGain = sBase + sExtra;
              const mul = getCountMultiplier(baseCount);
              const finalGain = sGain * mul;
              STATE.score += finalGain;
              createFloatingScore("+" + finalGain.toFixed(0) + " 分");
            }
            if (consumed) fulfillOneGroup(matchedGroupIndex);
            else renderWants();
            if (typeof updateTopInfo === "function") updateTopInfo();
          }
        }
        // 如果是桌上寿司最后一块被夹起：吃掉后释放该盘位
        if (currentHolding.src === "table" && currentHolding.origin && currentHolding.origin.kind === "table-slot" && currentHolding.origin.wasLastPiece) {
          const originSlot = document.querySelector(`.desk-slot[data-index="${currentHolding.origin.slotIndex}"]`);
          clearTableSlot(originSlot);
        }
        // 从传送带夹的寿司吃掉后，清空传送带该格
        if (currentHolding.src === "conveyor-plate" && draggedBeltEl) {
          draggedBeltEl.innerHTML = "";
          var oval = document.createElement("div");
          oval.className = "belt-item-empty";
          draggedBeltEl.appendChild(oval);
          draggedBeltEl.dataset.type = "placeholder";
        }
        resetHolding();
        if (window.TUTORIAL && TUTORIAL.active) TUTORIAL.onFoodEaten();
        return;
      }

      // 2. 饮料瓶拖到对应杯子才能倒：黑杯=壶/茶(先白开水再抹茶)，透明杯=橙汁/可尔必思/可乐
      if (currentHolding.src === "drink-bottle") {
        const glass = document.getElementById("zone-glass-cup");
        const back = document.getElementById("zone-black-cup");
        let poured = false;
        if (window.TUTORIAL && TUTORIAL.active && !TUTORIAL.canPour(currentHolding.raw)) {
          // 教程里：在倒水这一步，点击错地方不允许放下（仍然拿在手上）
          if (TUTORIAL.isPourStep && TUTORIAL.isPourStep()) return;
          resetHolding(); return;
        }
        if (elementContains(glass, dragPos.x, dragPos.y) && currentHolding.raw !== "hu" && currentHolding.raw !== "cha") {
          // 透明杯：只允许空杯倒入（半杯/满杯都不允许换/续）
          if (STATE.glassCupLevel === 0) {
            STATE.glassCupType = currentHolding.raw;
            STATE.glassCupLevel = 2;
            updateDrinksVisuals();
            poured = true;
          }
        } else if (elementContains(back, dragPos.x, dragPos.y)) {
          if (currentHolding.raw === "hu") {
            // 黑杯：只允许空杯倒白开水（抹茶/白开水都不能在未喝完时切换）
            if (STATE.blackCupLevel === 0) {
              STATE.blackCupType = "hu";
              STATE.blackCupLevel = 1;
              updateDrinksVisuals();
              poured = true;
            }
          } else if (currentHolding.raw === "cha") {
            // 抹茶粉：必须基于已倒好的白开水；变成抹茶后不能换回白开水，只能喝完再倒
            if (STATE.blackCupLevel > 0 && STATE.blackCupType === "hu") {
              STATE.blackCupType = "cha";
              STATE.blackCupLevel = 1;
              updateDrinksVisuals();
              poured = true;
            }
          }
        }
        if (poured) { resetHolding(); if (window.TUTORIAL && TUTORIAL.active) TUTORIAL.onPoured(); return; }
        // 未成功倒水：在教程倒水步骤中不放下，玩家必须倒成功
        if (window.TUTORIAL && TUTORIAL.active && TUTORIAL.isPourStep && TUTORIAL.isPourStep()) return;
        // 非教程或非倒水步骤：点空白处放回原位（拿回筷子）
        resetHolding(); return;
      }

      // 3. Placing Cup back -> just update visuals
      if (currentHolding.src === "cup") {
        // 只有放回原杯位才放下；点空白处不发生任何事
        const back = document.getElementById("zone-black-cup");
        const glass = document.getElementById("zone-glass-cup");
        const overBack = elementContains(back, dragPos.x, dragPos.y);
        const overGlass = elementContains(glass, dragPos.x, dragPos.y);
        if ((currentHolding.raw === "blackCup" && overBack) || (currentHolding.raw === "glassCup" && overGlass)) {
          updateDrinksVisuals();
          resetHolding();
          return;
        }
        // 点空白处：放回原位（拿回筷子）
        resetHolding();
        return;
      }

      // 3.5 放回去：未蘸酱的桌上寿司/盘装原料可以点回原盘子（蘸酱后禁止放回）
      // 新手引导：强制“有效点击/有效放置”推进，不允许任何一步提前放回去
      if (window.TUTORIAL && TUTORIAL.active) {
        // 不处理“放回原盘/放回桌上”这一类取消行为，玩家必须完成当前步骤的有效落点
      } else
      if (currentHolding.mods && currentHolding.mods.length === 0) {
        // 放回桌上原盘
        if (currentHolding.src === "table" && currentHolding.origin && currentHolding.origin.kind === "table-slot") {
          const originSlot = document.querySelector(`.desk-slot[data-index="${currentHolding.origin.slotIndex}"]`);
          if (originSlot && originSlot.classList.contains("has-item") && elementContains(originSlot, dragPos.x, dragPos.y)) {
            if (addOneSushiPcToSlot(originSlot, currentHolding.raw)) {
              resetHolding();
              return;
            }
            return; // 放不回（已满等）就继续拿着
          }
        }
        // 放回盘装大盘（盘装本来不变，等同于取消拿起）
        if (currentHolding.src === "dish") {
          const dish = Array.from(document.querySelectorAll(".dish-item")).find(el => el.dataset.raw === currentHolding.raw && elementContains(el, dragPos.x, dragPos.y));
          if (dish) { resetHolding(); return; }
        }
      }

      // 4a. 回转盘放到桌上：只有放到空位才落盘并清空传送带该格；闯关未解锁槽位(desk-slot-locked)不可放置
      if (currentHolding.src === "conveyor-plate") {
        const emptySlot = Array.from(document.querySelectorAll(".desk-slot")).find(el => {
          if (!el) return false;
          if (el.classList.contains("has-item")) return false;
          if (el.classList.contains("desk-slot-locked")) return false;
          if (!elementContains(el, dragPos.x, dragPos.y)) return false;
          // 新手引导：必须放到指定桌位（相应的位置）
          if (window.TUTORIAL && TUTORIAL.active && typeof TUTORIAL.isExpectedTableSlot === "function") {
            return TUTORIAL.isExpectedTableSlot(el);
          }
          return true;
        });
        if (emptySlot) {
          if (window.TUTORIAL && TUTORIAL.active && !TUTORIAL.canPlacePlateOnTable()) {
            return; // 点错：继续拿着
          }
          emptySlot.classList.add("has-item");
          emptySlot.dataset.type = currentHolding.raw;
          emptySlot.dataset.mods = "[]";
          // 与传送带/拿在手里时使用完全同一套 DOM 结构和布局类：
          // 直接克隆一整个 belt-item 到桌上，再由 .desk-slot.has-item .belt-item 控制整体缩放/居中，
          // 确保寿司在盘子上的相对位置 100% 一致。
          const sameItem = createOneConveyorItem(currentHolding.raw);
          sameItem.classList.add("desk-belt-item");
          emptySlot.appendChild(sameItem);
          if (draggedBeltEl) {
            draggedBeltEl.innerHTML = "";
            const oval = document.createElement("div");
            oval.className = "belt-item-empty";
            draggedBeltEl.appendChild(oval);
            draggedBeltEl.dataset.type = "placeholder";
          }
          resetHolding();
          draggedBeltEl = null;
          if (window.TUTORIAL && TUTORIAL.active) TUTORIAL.onPlatePlaced(emptySlot);
          return;
        }
      }

      // 4b. 只有从寿司窗口拿的整盘才能放虚线空位；单颗寿司/桌上夹的/盘菜不能占空位（不处理放空位）

      // 5. Dipping Sauce（仅当该组合有对应图片时才允许蘸取，否则直接失败不改变）
      let dipped = false;
      let overSauce = false;
      document.querySelectorAll(".sauce-item").forEach(el => {
        if (!dipped && elementContains(el, dragPos.x, dragPos.y)) {
          overSauce = true;
          const addMods = (el.dataset.mod || "").split("+").filter(Boolean);
          // 只能“增加”新酱料（例如从酱油变成芥末酱油=增加 wb），不能去掉已有的
          const nextMods = addMods.filter(m => !currentHolding.mods.includes(m));
          if (nextMods.length > 0) {
            const candidateMods = currentHolding.mods.concat(nextMods);
            // 按 MOD_ORDER 排序，生成与素材文件一致的顺序；支持任意顺序蘸取
            const seen = new Set();
            const uniq = [];
            candidateMods.forEach(m => {
              if (!m) return;
              if (seen.has(m)) return;
              seen.add(m);
              uniq.push(m);
            });
            const sortedMods = uniq.sort((a, b) => MOD_ORDER.indexOf(a) - MOD_ORDER.indexOf(b));
            const imgName = wantToImgName([currentHolding.raw].concat(sortedMods));
            const comboExists = !!(imgName && g_CroppedCanvas[imgName]);
            if (comboExists) {
              currentHolding.mods = sortedMods;
              dipped = true;
              grab(currentHolding.raw, currentHolding.src, null, currentHolding.mods, currentHolding.origin);
              if (window.TUTORIAL && TUTORIAL.active) TUTORIAL.onDipped(el.dataset.mod || "");
            }
          }
        }
      });
      if (dipped) return; // Still holding but dipped
      if (overSauce) return; // 蘸不到=无事发生，继续拿着，不消失

      // Cancel Drop：回转盘松手未放到桌上/吃掉 → 还原到原位（去掉虚影）
      if (currentHolding.src === "conveyor-plate" && draggedBeltEl) {
        // 新手引导：不允许“松手取消回转盘拿起”，必须落到正确桌位
        if (window.TUTORIAL && TUTORIAL.active) return;
        draggedBeltEl.classList.remove("belt-item-ghost");
        resetHolding();
        return;
      }
      // 空位只接受从寿司窗口拿的整盘，不把桌上夹的塞回空位

      // 只要没命中任何交互目标：继续拿着（点空白处不消失）
      return;
    }

    function resetHolding() {
      const prev = currentHolding;
      // 清理原位影子/占位
      try {
        document.querySelectorAll(".drink-slot.ghost").forEach(el => el.classList.remove("ghost"));
        document.querySelectorAll(".dish-item.ghost").forEach(el => el.classList.remove("ghost"));
        const back = document.getElementById("zone-black-cup");
        const glass = document.getElementById("zone-glass-cup");
        if (back) back.classList.remove("placeholder");
        if (glass) glass.classList.remove("placeholder");
      } catch (e) { }

      currentHolding = null;
      draggedBeltEl = null;
      document.getElementById("chop-food").innerHTML = "";
      document.getElementById("chopsticks-wrap").classList.remove("holding-plate", "holding-drink");
      document.getElementById("chop-back").classList.remove("hidden");
      document.getElementById("chop-front").classList.remove("hidden");
      // 放下瞬间立刻回到“筷子尖跟鼠标”的位置（避免看起来居中）
      updateWrapPosition(dragPos.x, dragPos.y);
    }

    /* ========== 第1关：新手引导 ========== */
    window.TUTORIAL = (function () {
      const overlay = document.getElementById("tutorial-overlay");
      const highlight = document.getElementById("tutorial-highlight");
      const arrow = document.getElementById("tutorial-arrow");
      const text = document.getElementById("tutorial-text");
      const appEl = document.getElementById("app");
      const dimTop = document.getElementById("dim-top");
      const dimLeft = document.getElementById("dim-left");
      const dimRight = document.getElementById("dim-right");
      const dimBottom = document.getElementById("dim-bottom");

      const STEP = {
        LookWants: 0,
        GrabSashimi: 1,
        EatSashimi: 2,
        GrabPlate: 3,
        PlacePlate: 4,
        GrabSushi: 5,
        DipSoy: 6,
        EatSushi: 7,
        GrabTeapot: 8,
        PourWater: 9,
        GrabCup: 10,
        DrinkWater: 11,
        Done: 12
      };

      const api = {
        active: false,
        step: 0,
        // 保存引导过程中的关键目标（例如放到哪个桌位）
        _tableSlotIndex: null,
        _expectedTableSlotIndex: null,
        _timers: [],
        _hotRect: null,
        _hotEllipse: null, // { cx, cy, rx, ry } in viewport coords
        _lookPhase: 0, // 0=看“想吃”，1=看“下一个”

        reset() {
          api.active = false;
          api.step = 0;
          api._tableSlotIndex = null;
          api._expectedTableSlotIndex = null;
          try {
            (api._timers || []).forEach(id => { try { clearTimeout(id); } catch (e) { } });
          } catch (e) { }
          api._timers = [];
          hideOverlay();
        },

        start() {
          api.active = true;
          api.step = STEP.LookWants;
          api._lookPhase = 0;
          api._tableSlotIndex = null;
          api._expectedTableSlotIndex = null;
          // 固定第一轮“想吃”：三文鱼刺身 + 三文鱼寿司+soy
          STATE.wantsCurrent = [
            { items: ["salmonSlice"], count: 1 },
            { items: ["norm_salmon", "soy"], count: 1 }
          ];
          STATE.wantsNext = [{ items: ["hu"], count: 1 }]; // 教程后半段会用到喝水
          STATE.wantDeadlines = null; // 教程中无时限
          renderWants();
          updateTopInfo();
          // 传送带确保出现一个 norm_salmon 盘在显眼位置（第一个）
          ensureTutorialConveyorHasSalmon();
          // 第一步：先看“想吃”，点击后再看“下一个”，再点一次才进入拿刺身
          showOverlay();
          pointTo(document.getElementById("bubble-current") || document.getElementById("bubble-area"));
        },

        // ---- 允许/禁止交互（点错=无事发生） ----
        canGrabDish(raw) {
          return api.active && api.step === STEP.GrabSashimi && raw === "salmonSlice";
        },
        canGrabConveyorPlate(type) {
          // 教程里：只允许拿“三文鱼”回转寿司盘
          // 盘子类型是 raw，如 norm_salmon / salmonLove / roll_salmon 等
          return api.active && api.step === STEP.GrabPlate && !!type && String(type).indexOf("salmon") >= 0;
        },
        canPlacePlateOnTable() {
          return api.active && api.step === STEP.PlacePlate;
        },
        canGrabFromTable(slotEl) {
          if (!api.active) return true;
          if (api.step !== STEP.GrabSushi) return false;
          const idx = Number(slotEl.dataset.index);
          return Number.isFinite(idx) && idx === api._tableSlotIndex && slotEl.dataset.type === "norm_salmon";
        },
        canGrabDrinkBottle(raw) {
          return api.active && api.step === STEP.GrabTeapot && raw === "hu";
        },
        canGrabCup(cupId) {
          return api.active && api.step === STEP.GrabCup && cupId === "zone-black-cup";
        },
        canPour(raw) {
          return api.active ? (api.step === STEP.PourWater && raw === "hu") : true;
        },
        canDropToEatZone(holding) {
          if (!api.active) return true;
          if (api.step === STEP.EatSashimi) return holding && holding.src === "dish" && holding.raw === "salmonSlice";
          if (api.step === STEP.EatSushi) return holding && (holding.src === "table") && holding.raw === "norm_salmon" && (holding.mods || []).includes("soy");
          if (api.step === STEP.DrinkWater) return holding && holding.src === "cup" && holding.raw === "blackCup";
          return false;
        },

        // ---- 事件钩子（由交互逻辑调用） ----
        onPlatePlaced(slotEl) {
          if (!api.active || api.step !== STEP.PlacePlate) return;
          api._tableSlotIndex = Number(slotEl.dataset.index);
          api.step = STEP.GrabSushi;
          showOverlay("很好！现在从桌上夹起【三文鱼寿司】。点击盘子上的寿司夹起来。");
          pointTo(slotEl);
        },
        onDipped(modStr) {
          if (!api.active) return;
          if (api.step !== STEP.DipSoy) return;
          // 只有蘸到 soy 才算
          if (!modStr || modStr.indexOf("soy") < 0) return;
          api.step = STEP.EatSushi;
          showOverlay("蘸好酱油了！把寿司拖到最下方吃掉。");
          pointTo(document.getElementById("eat-zone"));
        },
        onFoodEaten() {
          if (!api.active) return;
          if (api.step === STEP.EatSashimi) {
            api.step = STEP.GrabPlate;
            showOverlay("接下来吃【三文鱼寿司+酱油】。先从回转台拿【三文鱼寿司盘】。");
            pointTo(getConveyorFirstSalmonEl());
            return;
          }
          if (api.step === STEP.EatSushi) {
            // 刷新到喝水环节
            STATE.wantsCurrent = [{ items: ["hu"], count: 1 }, { items: ["hu"], count: 1 }];
            STATE.wantsNext = [];
            renderWants();
            api.step = STEP.GrabTeapot;
            showOverlay("刷新啦！现在拿起【茶壶】。点击左侧茶壶拿起。");
            pointTo(document.getElementById("slot-hu"));
            return;
          }
        },
        onPoured() {
          if (!api.active || api.step !== STEP.PourWater) return;
          api.step = STEP.GrabCup;
          showOverlay("倒好了！现在拿起【水杯】。点击左侧黑色杯子拿起。");
          pointTo(document.getElementById("zone-black-cup"));
        },
        onDrinkCompleted(drinkContent) {
          if (!api.active || api.step !== STEP.DrinkWater) return;
          api.step = STEP.Done;
          hideOverlay();
          // 完成：提示并回到开始游戏弹窗（并重置）
          showCustomModal("你已经学会了！<br>那么开吃吧！", [
            {
              text: "返回",
              primary: true,
              cb: () => {
                api.reset();
                // 重置第1关场景到“未开始计时”的状态
                STATE.playing = false;
                STATE.paused = false;
                if (typeof resetHolding === "function") resetHolding();
                startGame("level", { startTimer: false });
                showLevelStartModal(1);
              }
            }
          ]);
        },

        // 从回转寿司成功拿起整盘时调用
        onGrabPlate(rawType) {
          if (!api.active || api.step !== STEP.GrabPlate) return;
          if (!rawType || String(rawType).indexOf("salmon") < 0) return;
          api.step = STEP.PlacePlate;
          // 高亮“指定的”一个空桌位，并记录为唯一允许落盘的位置
          const targetSlot = document.querySelector(".desk-slot:not(.has-item):not(.desk-slot-locked)") || document.querySelector(".desk-slot");
          api._expectedTableSlotIndex = targetSlot ? Number(targetSlot.dataset.index) : null;
          if (targetSlot) pointTo(targetSlot);
        },

        // 教程内部用来判断“当前是不是在倒水这一步”
        isPourStep() {
          return api.active && api.step === STEP.PourWater;
        }
      };

      function showOverlay(msg) {
        if (!overlay) return;
        overlay.classList.add("visible");
        // 去除所有文字引导，只保留动画/高亮
        if (text) text.innerText = "";
      }
      function hideOverlay() {
        try { overlay && overlay.classList.remove("visible"); } catch (e) { }
        if (highlight) {
          highlight.style.left = "-9999px";
          highlight.style.top = "-9999px";
          highlight.style.width = "0px";
          highlight.style.height = "0px";
        }
        // 把四块遮罩也清到看不见（避免残留）
        const parts = [dimTop, dimLeft, dimRight, dimBottom];
        parts.forEach(p => {
          if (!p) return;
          p.style.left = "-9999px";
          p.style.top = "-9999px";
          p.style.width = "0px";
          p.style.height = "0px";
        });
        if (arrow) { arrow.style.left = "-9999px"; arrow.style.top = "-9999px"; }
        api._hotRect = null;
        api._hotEllipse = null;
      }

      function rectCenter(el) {
        if (!el) return null;
        const r = el.getBoundingClientRect();
        return {
          x: r.left + r.width / 2,
          y: r.top + r.height / 2,
          top: r.top,
          bottom: r.bottom,
          left: r.left,
          right: r.right,
          w: r.width,
          h: r.height,
          rect: r
        };
      }
      function pointTo(el) {
        if (!overlay) return;
        const c = rectCenter(el);
        if (!c) return;
        const appRect = appEl ? appEl.getBoundingClientRect() : { left: 0, top: 0, width: window.innerWidth || 0, height: window.innerHeight || 0 };
        const margin = 6; // 高亮框比目标略大一点
        const hlLeft = (c.left - appRect.left) - margin;
        const hlTop = (c.top - appRect.top) - margin;
        const hlWidth = c.w + margin * 2;
        const hlHeight = c.h + margin * 2;

        if (highlight) {
          highlight.style.left = hlLeft + "px";
          highlight.style.top = hlTop + "px";
          highlight.style.width = hlWidth + "px";
          highlight.style.height = hlHeight + "px";
        }
        // 四块遮罩拼“洞”
        const W = appRect.width || 0;
        const H = appRect.height || 0;
        const holeLeft = Math.max(0, hlLeft);
        const holeTop = Math.max(0, hlTop);
        const holeRight = Math.min(W, hlLeft + hlWidth);
        const holeBottom = Math.min(H, hlTop + hlHeight);
        const holeW = Math.max(0, holeRight - holeLeft);
        const holeH = Math.max(0, holeBottom - holeTop);
        if (dimTop) { dimTop.style.left = "0px"; dimTop.style.top = "0px"; dimTop.style.width = W + "px"; dimTop.style.height = holeTop + "px"; }
        if (dimBottom) { dimBottom.style.left = "0px"; dimBottom.style.top = holeBottom + "px"; dimBottom.style.width = W + "px"; dimBottom.style.height = Math.max(0, H - holeBottom) + "px"; }
        if (dimLeft) { dimLeft.style.left = "0px"; dimLeft.style.top = holeTop + "px"; dimLeft.style.width = holeLeft + "px"; dimLeft.style.height = holeH + "px"; }
        if (dimRight) { dimRight.style.left = holeRight + "px"; dimRight.style.top = holeTop + "px"; dimRight.style.width = Math.max(0, W - holeRight) + "px"; dimRight.style.height = holeH + "px"; }

        if (arrow) {
          const ax = hlLeft + hlWidth / 2;
          const ay = hlTop + hlHeight + 18;
          arrow.style.left = ax + "px";
          arrow.style.top = ay + "px";
        }

        // 当前可交互区域：目标自身的矩形
        api._hotRect = c.rect;
        // 同时保存一个“椭圆热区”，用于强制“圆框内点击才生效”
        api._hotEllipse = {
          cx: (c.left + c.right) / 2,
          cy: (c.top + c.bottom) / 2,
          rx: Math.max(6, (c.right - c.left) / 2),
          ry: Math.max(6, (c.bottom - c.top) / 2)
        };
      }

      function getDishEl(raw) {
        return Array.from(document.querySelectorAll(".dish-item")).find(el => el && el.dataset && el.dataset.raw === raw) || null;
      }
      function getConveyorFirstSalmonEl() {
        // 新手引导里，高亮整条回转寿司区域，而不是单个盘子
        return document.getElementById("conveyor-row") || document.getElementById("conveyor-track");
      }
      function ensureTutorialConveyorHasSalmon() {
        const track = document.getElementById("conveyor-track");
        if (!track) return;
        // 把第一个格子替换成 norm_salmon，确保引导可完成
        const first = track.firstElementChild;
        if (first && first.classList && first.classList.contains("belt-item") && first.dataset && first.dataset.type === "norm_salmon") return;
        const newEl = createOneConveyorItem("norm_salmon");
        if (first) track.replaceChild(newEl, first);
        else track.appendChild(newEl);
      }

      // 引导推进：在 grab/tryDrop 里配合调用
      // 抓到刺身
      const _origGrab = window.grab;
      window.grab = function (rawId, srcType, explicitImg, mods, origin) {
        // 调用原 grab
        _origGrab(rawId, srcType, explicitImg, mods, origin);
        if (!api.active) return;
        if (api.step === STEP.GrabSashimi && srcType === "dish" && rawId === "salmonSlice") {
          api.step = STEP.EatSashimi;
          pointTo(document.getElementById("eat-zone"));
          return;
        }
        if (api.step === STEP.GrabPlate && srcType === "conveyor-plate") {
          api.step = STEP.PlacePlate;
          pointTo(document.querySelector(".desk-slot:not(.has-item):not(.desk-slot-locked)") || document.querySelector(".desk-slot"));
          return;
        }
        if (api.step === STEP.GrabSushi && srcType === "table" && rawId === "norm_salmon") {
          api.step = STEP.DipSoy;
          // 酱油是第一个 sauce-item（解锁时）
          pointTo(document.querySelector('#sauce-grid .sauce-item[data-mod="soy"]') || document.querySelector("#sauce-grid .sauce-item"));
          return;
        }
        if (api.step === STEP.GrabTeapot && srcType === "drink-bottle" && rawId === "hu") {
          api.step = STEP.PourWater;
          pointTo(document.getElementById("zone-black-cup"));
          return;
        }
        if (api.step === STEP.GrabCup && srcType === "cup" && rawId === "blackCup") {
          api.step = STEP.DrinkWater;
          pointTo(document.getElementById("eat-zone"));
          return;
        }
      };

      // 让 pointerdown 先经过教程逻辑，决定是否吃掉事件
      api.onPointerDown = function (x, y, ev) {
        if (!api.active) return false;
        const r = api._hotRect;
        // 有高亮区域时：只有“圆/椭圆框内”可以点，外面全部吞掉
        if (api._hotEllipse) {
          const inside = api.isInsideHot(x, y);
          if (!inside) {
            ev.preventDefault();
            ev.stopPropagation();
            return true;
          }
        }

        // 看想吃 / 看下一个：用点击推进而不是自动计时
        if (api.step === STEP.LookWants && (r || api._hotEllipse)) {
          ev.preventDefault();
          ev.stopPropagation();
          if (api._lookPhase === 0) {
            // 第一击：从“想吃”切到“下一个”
            api._lookPhase = 1;
            pointTo(document.getElementById("bubble-next") || document.getElementById("bubble-area"));
          } else {
            // 第二击：进入“拿三文鱼刺身”
            api._lookPhase = 0;
            api.step = STEP.GrabSashimi;
            pointTo(getDishEl("salmonSlice"));
          }
          return true;
        }

        return false;
      };

      // --- 对外：热区判定（用于 pointerup gate） ---
      api.isInsideHot = function (x, y) {
        if (!api.active) return true;
        const e = api._hotEllipse;
        if (!e) return true;
        const dx = (x - e.cx) / (e.rx || 1);
        const dy = (y - e.cy) / (e.ry || 1);
        return (dx * dx + dy * dy) <= 1.0;
      };
      api.isExpectedTableSlot = function (slotEl) {
        if (!api.active) return true;
        if (!slotEl) return false;
        if (api.step !== STEP.PlacePlate) return true;
        const idx = Number(slotEl.dataset.index);
        if (!Number.isFinite(idx)) return false;
        if (!Number.isFinite(api._expectedTableSlotIndex)) return true;
        return idx === api._expectedTableSlotIndex;
      };

      return api;
    }());

    function createFloatingScore(txt) {
      const el = document.createElement("div");
      el.innerText = txt;
      el.style.position = "absolute"; el.style.left = dragPos.x + "px"; el.style.top = dragPos.y + "px";
      el.style.color = "#c45c3e"; el.style.fontWeight = "bold"; el.style.fontSize = "1.5rem"; el.style.pointerEvents = "none"; el.style.zIndex = "99999";
      el.style.transition = "top 1s, opacity 1s";
      document.body.appendChild(el);
      setTimeout(() => { el.style.top = (dragPos.y - 100) + "px"; el.style.opacity = 0; }, 50);
      setTimeout(() => el.remove(), 1050);
    }

    /** raw 规范化：传送带/桌上 tempera 三块算一种，与想吃的 tempera_mid 统一 */
    function normalizeWantRaw(raw) {
      if (raw == null || raw === "") return "";
      var r = String(raw);
      if (r === "tempera_left" || r === "tempera_right") return "tempera_mid";
      return r;
    }
    /** 酱料按 MOD_ORDER 排序，与 wantToImgName 等一致，保证匹配时顺序统一 */
    function sortModsForMatch(mods) {
      if (!mods || !mods.length) return [];
      // 去重 + 排序：绝不允许出现 soy+soy+wb 这种重复调料态
      var seen = new Set();
      var uniq = [];
      for (var i = 0; i < mods.length; i++) {
        var m = mods[i];
        if (!m) continue;
        if (seen.has(m)) continue;
        seen.add(m);
        uniq.push(m);
      }
      return uniq.sort(function (a, b) { return MOD_ORDER.indexOf(a) - MOD_ORDER.indexOf(b); });
    }
    /** 手持是否匹配某一组想吃。组格式 { items, count }，items[0]=base，items.slice(1)=mods */
    function holdingMatchesGroup(holding, group) {
      if (!holding || holding.raw == null) return false;
      var reqItems = group && group.items ? group.items : (Array.isArray(group) ? group : []);
      if (!reqItems || reqItems.length === 0) return false;
      // 规则统一：订单 items 也走同一套 normalize（拆分+去重+排序），避免出现 soy+wb token 或重复导致匹配异常
      var normReqItems = normalizeGroupItems(reqItems);
      if (normalizeWantRaw(normReqItems[0]) !== normalizeWantRaw(holding.raw)) return false;
      var reqMods = sortModsForMatch(normReqItems.slice(1));
      var holdMods = sortModsForMatch(holding.mods || []);
      // 严格匹配：每个组合都是限制的（蘸过酱不能当作没蘸酱）
      if (reqMods.length !== holdMods.length) return false;
      for (var i = 0; i < reqMods.length; i++) {
        if (reqMods[i] !== holdMods[i]) return false;
      }
      return true;
    }
    /** 返回当前想吃中匹配到的组下标；无匹配返回 -1 */
    function getMatchingWantGroupIndex(holding) {
      if (!STATE.wantsCurrent || !STATE.wantsCurrent.length) return -1;
      // 通用规则（你说的“包含关系”）：当两组是同一个组合时，先消“需求份数更少”的那组；相等则左优先
      var bestIdx = -1;
      var bestNeedCount = Infinity;
      for (var i = 0; i < STATE.wantsCurrent.length; i++) {
        var g = STATE.wantsCurrent[i];
        if (!holdingMatchesGroup(holding, g)) continue;
        var need = (g && typeof g.count === "number") ? g.count : 1;
        if (need < bestNeedCount) {
          bestNeedCount = need;
          bestIdx = i;
        }
        // need 相等时保留更左的 bestIdx（先出现的）
      }
      return bestIdx;
    }

    /** 完成一组：先划掉，该侧用下一个补上，下一个刷新。用副本避免与 wantsNext 共享引用导致第二次不消除 */
    function fulfillOneGroup(matchedGroupIndex) {
      STATE.crossOutIndex = matchedGroupIndex;
      renderWants();
      setTimeout(() => {
        var nextGroup;
        if (STATE.wantsNext.length > 0) {
          var src = STATE.wantsNext[0];
          var nextCount = src.count != null ? src.count : 1;
          nextGroup = {
            items: normalizeGroupItems((src.items || []).slice()),
            count: nextCount,
            baseCount: src.baseCount != null ? src.baseCount : nextCount
          };
        } else {
          nextGroup = generateOrder();
        }
        STATE.wantsCurrent[matchedGroupIndex] = nextGroup;
        STATE.wantsNext = [generateOrder()];
        STATE.crossOutIndex = -1;
        // 快吃吧你/闯关：这一侧完成后，只重置这一侧的计时条，另一侧继续走
        if ((STATE.mode === "speed" || STATE.mode === "level") && Array.isArray(STATE.wantDeadlines)) {
          STATE.wantDeadlines[matchedGroupIndex] = getTimedGroupLimit(WANT_TIMER_SPEED, STATE.wantsCurrent[matchedGroupIndex]);
          if (typeof updateSpeedModeTimerBars === "function") updateSpeedModeTimerBars();
        }
        if (isFriendsActive()) {
          renderFriendsBubbles();
        }
        renderWants();
      }, 280);
    }

    function checkFulfillDrink(cupType) {
      // similarly check wants
    }

    // Start sequence
    initLoading();

    // ------------- 宽度驱动的等比缩放：所有内容只跟宽度走，禁止不同比例变形 -------------
    // 基准宽度按照当前设计宽度 560px 来算：
    // - 屏幕比 560 宽：不放大，保持 1:1 原始效果，只是左右留空/背景补齐。
    // - 屏幕比 560 窄：整块 #game 以「宽度比例」整体缩小，寿司/杯子/盘子间距和大小完全等比缩小。
    //   高度方向不单独挤压任何一块，禁止只改高度的压缩。
    (function () {
      const BASE_WIDTH = 560;

      function updateGameScaleByWidth() {
        const game = document.getElementById("game");
        if (!game) return;
        // 用「视口宽度」来算缩放比例，保证缩小后刚好铺满当前宽度，不留左右空白
        const vw = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth || 0;
        let scale = 1;
        if (vw > 0 && vw < BASE_WIDTH) {
          scale = vw / BASE_WIDTH;
        }
        game.style.transformOrigin = "top center";
        // 保留居中的 translateX(-50%)，在其基础上再做等比缩放
        game.style.transform = "translateX(-50%) scale(" + scale + ")";
      }

      window.addEventListener("resize", updateGameScaleByWidth);
      window.addEventListener("orientationchange", updateGameScaleByWidth);
      // 初次进入页面时也执行一次
      updateGameScaleByWidth();
    })();
  </script>
